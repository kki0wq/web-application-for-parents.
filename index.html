<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Колледж | Успеваемость</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ffe4f0, #ffd6e8);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* АВТОРИЗАЦИЯ */
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0e0ec;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .auth-tab.active {
            background: #e87fb0;
            color: white;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form.hidden {
            display: none;
        }

        .auth-input, .auth-select {
            padding: 14px 18px;
            border: 1px solid #ffcce0;
            border-radius: 30px;
            font-size: 16px;
        }

        .auth-btn {
            background: #e87fb0;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .auth-error {
            color: #e06b9e;
            text-align: center;
            font-size: 14px;
        }

        /* ДАШБОРД */
        .dashboard-content {
            display: none;
        }

        .dashboard-content.active {
            display: block;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ffe0f0;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: #e87fb0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        .logout-btn {
            background: #ffe0f0;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* КАРТОЧКИ */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #fff5f9;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid #ffe0f0;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #e87fb0;
        }

        .card {
            background: #fff5f9;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ffe0f0;
        }

        .card-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            color: #c45a8c;
        }

        .nav-btn {
            background: white;
            border: 1px solid #ffcce0;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px;
        }

        .nav-btn.active {
            background: #e87fb0;
            color: white;
            border-color: #e87fb0;
        }

        .bottom-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ffe0f0;
        }

        .progress-bar-container {
            background: #f0dce8;
            border-radius: 20px;
            height: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: #e87fb0;
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s;
        }

        /* ЧАТ */
        .chat-messages {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 80%;
        }

        .message.parent {
            background: #ffe0f0;
            margin-left: auto;
        }

        .message.curator {
            background: #f0dce8;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ffcce0;
            border-radius: 30px;
        }

        .chat-input button {
            background: #e87fb0;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            cursor: pointer;
        }

        .control-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group label {
            min-width: 100px;
        }

        .curator-select, .curator-input {
            padding: 10px;
            border: 1px solid #ffcce0;
            border-radius: 20px;
            flex: 1;
        }

        .curator-btn {
            background: #e87fb0;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 20px;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 600px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
            .control-group {
                flex-direction: column;
                align-items: stretch;
            }
            .control-group label {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- АВТОРИЗАЦИЯ -->
        <div id="authBlock">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">🌸 Вход</button>
                    <button class="auth-tab" data-tab="register">✨ Регистрация</button>
                </div>
                <div id="loginForm" class="auth-form">
                    <input type="email" id="loginEmail" class="auth-input" placeholder="Email">
                    <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                    <button id="doLoginBtn" class="auth-btn">Войти</button>
                    <div id="loginError" class="auth-error"></div>
                </div>
                <div id="registerForm" class="auth-form hidden">
                    <input type="text" id="regName" class="auth-input" placeholder="Имя и фамилия">
                    <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                    <select id="regRole" class="auth-select">
                        <option value="parent">Родитель</option>
                        <option value="curator">Куратор</option>
                    </select>
                    <div id="parentFields">
                        <input type="text" id="regChildName" class="auth-input" placeholder="ФИО студента">
                        <input type="text" id="regGroupNumber" class="auth-input" placeholder="Номер группы">
                    </div>
                    <div id="curatorFields" style="display: none;">
                        <input type="text" id="regCuratorGroup" class="auth-input" placeholder="Номер группы">
                    </div>
                    <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (мин. 6 символов)">
                    <button id="doRegisterBtn" class="auth-btn">Зарегистрироваться</button>
                    <div id="regError" class="auth-error"></div>
                </div>
            </div>
        </div>

        <!-- ДАШБОРД -->
        <div id="dashboardBlock" class="dashboard-content">
            <div class="dashboard-header">
                <div class="user-avatar" id="userAvatar" onclick="alert('Профиль')">🌸</div>
                <div>
                    <span id="userNameSpan">Пользователь</span>
                    <span id="userRoleBadge" style="margin-left: 10px; background:#ffe0f0; padding:4px 12px; border-radius:20px;"></span>
                </div>
                <button id="logoutBtnMain" class="logout-btn">Выйти</button>
            </div>

            <div id="curatorGroupBlock" style="background:#fff0f8; border-radius:24px; padding:15px; margin-bottom:20px; display:none;">
                <div style="font-weight:bold;">📚 Моя группа</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="curatorGroupInput" placeholder="Номер группы" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ffcce0;">
                    <button id="setCuratorGroupBtn" style="background:#e87fb0; color:white; border:none; padding:10px 20px; border-radius:20px;">Установить</button>
                </div>
                <div id="currentGroupDisplay" style="margin-top:10px; font-size:14px;"></div>
            </div>

            <div id="usersManagementBlock" style="background:white; border-radius:24px; padding:15px; margin-bottom:20px; display:none;">
                <div style="font-weight:bold;">👥 Родители</div>
                <div id="usersTableContainer" style="margin-top:10px;"></div>
            </div>

            <div id="studentsListContainer" style="background:white; border-radius:24px; padding:15px; margin-bottom:20px; display:none;">
                <div style="font-weight:bold;">👨‍🎓 Студенты</div>
                <div id="studentsGrid" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>
            </div>

            <div id="studentStatsBlock">
                <div id="currentStudentInfo" style="background:#fff0f8; border-radius:20px; padding:12px 20px; margin-bottom:20px; display:flex; justify-content:space-between;">
                    <span>🎓 <strong id="currentStudentName">—</strong></span>
                    <span id="studentGroupBadge" style="background:#ffe0f0; padding:4px 12px; border-radius:20px;">Группа</span>
                </div>

                <div class="stats-row">
                    <div class="stat-card"><div>📚 Средний балл</div><div class="stat-value" id="avgScoreStat">—</div></div>
                    <div class="stat-card"><div>📅 Пропуски</div><div class="stat-value" id="absencesStat">—</div></div>
                    <div class="stat-card"><div>⭐ Предметов</div><div class="stat-value" id="subjectsCountStat">15</div></div>
                </div>

                <div class="card">
                    <div class="card-title">📊 Успеваемость</div>
                    <div style="display:flex; justify-content:space-between;"><span>Средний балл:</span><span id="avgScoreDisplay" style="font-size:28px; font-weight:bold; color:#e87fb0;">—</span></div>
                    <div class="progress-bar-container"><div class="progress-bar" id="avgProgress"></div></div>
                    <button class="nav-btn" style="margin-top:10px; width:100%;" data-page="detailed-progress">Подробнее →</button>
                </div>

                <div class="card">
                    <div class="card-title">📆 Посещаемость</div>
                    <div style="display:flex; justify-content:space-between;"><span>Пропуски:</span><span id="absencesDisplay" style="font-size:28px; font-weight:bold; color:#e06b9e;">—</span></div>
                    <div class="progress-bar-container"><div class="progress-bar" id="attendanceProgress"></div></div>
                    <button class="nav-btn" style="margin-top:10px; width:100%;" data-page="attendance-detail">Подробнее →</button>
                </div>

                <div class="card">
                    <div class="card-title">💬 Чат с куратором</div>
                    <div id="chatMessagesPreview" class="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="Напишите сообщение...">
                        <button id="sendChatBtn">📨</button>
                    </div>
                </div>
            </div>

            <div id="noStudentsMessage" style="background:#fff0f8; border-radius:24px; padding:40px; text-align:center; display:none;">
                <div style="font-size:48px;">👨‍🎓</div>
                <h3>Нет студентов</h3>
                <p>Добавьте студентов через регистрацию родителей</p>
            </div>

            <div id="curatorPanel" style="background:#fff0f8; border-radius:24px; padding:20px; margin-top:20px; display:none;">
                <h4>🔧 Панель куратора</h4>
                <div class="control-group">
                    <label>Ученик:</label>
                    <select id="studentForGradeSelect" class="curator-select"></select>
                </div>
                <div class="control-group">
                    <label>Оценка:</label>
                    <select id="subjectSelect" class="curator-select"></select>
                    <select id="gradeSelect" class="curator-select">
                        <option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option>
                    </select>
                    <label style="min-width:80px;"><input type="checkbox" id="isControl"> ×2 вес</label>
                </div>
                <div class="control-group">
                    <label>Пропуск:</label>
                    <input type="date" id="absenceDate" class="curator-input">
                    <select id="absenceType" class="curator-select">
                        <option value="болезнь">Болезнь</option>
                        <option value="уважительная">Уважительная</option>
                        <option value="неуважительная">Неуважительная</option>
                    </select>
                    <button id="addAbsenceBtn" class="curator-btn">+</button>
                </div>
                <button id="addGradeBtn" class="curator-btn" style="margin-top:10px;">➕ Поставить оценку</button>
                <div id="curatorSuccessMsg" class="success-msg"></div>
            </div>

            <div class="bottom-nav">
                <button class="nav-btn active" data-page="dashboard">Главная</button>
                <button class="nav-btn" data-page="detailed-progress">Успеваемость</button>
                <button class="nav-btn" data-page="attendance-detail">Посещаемость</button>
            </div>
            <div id="dynamic-page-content"></div>
        </div>
    </div>

    <script>
        // ДАННЫЕ
        const ALL_SUBJECTS = ["Математика","Русский язык","Литература","Физика","Химия","Биология","История","Обществознание","Английский","Информатика","География","Физкультура","ИЗО","Музыка","Технология"];
        
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let chatMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
        let curatorGroups = JSON.parse(localStorage.getItem('curatorGroups')) || {};
        
        function saveAll() {
            localStorage.setItem('students', JSON.stringify(students));
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
            localStorage.setItem('curatorGroups', JSON.stringify(curatorGroups));
        }
        
        let currentUser = null;
        let selectedStudentId = null;
        
        function getCurrentUser() {
            const u = localStorage.getItem('currentUser');
            return u ? JSON.parse(u) : null;
        }
        function setCurrentUser(u) { localStorage.setItem('currentUser', JSON.stringify(u)); currentUser = u; }
        function clearCurrentUser() { localStorage.removeItem('currentUser'); currentUser = null; }
        function getStudentById(id) { return students.find(s => s.id === id); }
        function getStudentForParent(email) { return students.find(s => s.parentEmail === email); }
        
        // Подсчёт среднего балла с весом
        function avgGradeWeighted(student) {
            if (!student?.grades) return "—";
            let totalWeight = 0, sumWeighted = 0;
            for (let subj in student.grades) {
                if (Array.isArray(student.grades[subj])) {
                    for (let g of student.grades[subj]) {
                        let val = typeof g === 'object' ? g.value : g;
                        let weight = (typeof g === 'object' && g.weight) ? g.weight : 1;
                        sumWeighted += val * weight;
                        totalWeight += weight;
                    }
                }
            }
            if (totalWeight === 0) return "—";
            return (sumWeighted / totalWeight).toFixed(2).replace('.', ',');
        }
        
        function totalAbs(student) { return student?.absences?.length || 0; }
        
        function updateUI() {
            if (!currentUser) return;
            document.getElementById('userNameSpan').innerText = currentUser.name;
            const badge = document.getElementById('userRoleBadge');
            badge.innerText = currentUser.role === 'parent' ? 'Родитель' : 'Куратор';
            
            if (currentUser.role === 'parent') {
                let student = getStudentForParent(currentUser.email);
                if (student) {
                    selectedStudentId = student.id;
                    displayStudentStats(student);
                    document.getElementById('studentStatsBlock').style.display = 'block';
                    document.getElementById('noStudentsMessage').style.display = 'none';
                } else {
                    document.getElementById('studentStatsBlock').style.display = 'none';
                    document.getElementById('noStudentsMessage').style.display = 'block';
                }
                document.getElementById('curatorPanel').style.display = 'none';
                document.getElementById('curatorGroupBlock').style.display = 'none';
                document.getElementById('usersManagementBlock').style.display = 'none';
                document.getElementById('studentsListContainer').style.display = 'none';
            } else if (currentUser.role === 'curator') {
                document.getElementById('curatorPanel').style.display = 'block';
                document.getElementById('curatorGroupBlock').style.display = 'block';
                document.getElementById('usersManagementBlock').style.display = 'block';
                
                let curatorGroup = curatorGroups[currentUser.email] || "";
                let filtered = students.filter(s => s.group === curatorGroup);
                
                if (filtered.length === 0) {
                    document.getElementById('studentStatsBlock').style.display = 'none';
                    document.getElementById('noStudentsMessage').style.display = 'block';
                    document.getElementById('studentsListContainer').style.display = 'none';
                    return;
                }
                document.getElementById('studentStatsBlock').style.display = 'block';
                document.getElementById('noStudentsMessage').style.display = 'none';
                document.getElementById('studentsListContainer').style.display = 'block';
                
                if (!selectedStudentId || !filtered.find(s => s.id === selectedStudentId)) {
                    selectedStudentId = filtered[0].id;
                }
                let student = getStudentById(selectedStudentId);
                if (student) displayStudentStats(student);
                
                showStudentsList();
                renderUsersTable();
                updateStudentSelect();
                document.getElementById('currentGroupDisplay').innerHTML = curatorGroup ? `Группа: <strong>${curatorGroup}</strong>` : 'Группа не выбрана';
            }
            renderChatMessages();
        }
        
        function displayStudentStats(student) {
            if (!student) return;
            let avg = avgGradeWeighted(student);
            let abs = totalAbs(student);
            document.getElementById('avgScoreDisplay').innerText = avg;
            document.getElementById('avgScoreStat').innerText = avg;
            document.getElementById('absencesDisplay').innerText = abs;
            document.getElementById('absencesStat').innerText = abs;
            document.getElementById('avgProgress').style.width = (avg !== "—" ? (parseFloat(avg.replace(',', '.')) / 5 * 100) : 0) + "%";
            document.getElementById('attendanceProgress').style.width = Math.min(100, 100 - (abs / 30 * 100)) + "%";
            document.getElementById('currentStudentName').innerHTML = student.name;
            document.getElementById('studentGroupBadge').innerHTML = `Группа ${student.group || "—"}`;
            let sel = document.getElementById('subjectSelect');
            if (sel) {
                sel.innerHTML = '';
                ALL_SUBJECTS.forEach(s => sel.innerHTML += `<option value="${s}">📚 ${s}</option>`);
            }
        }
        
        function showStudentsList() {
            let curatorGroup = curatorGroups[currentUser.email] || "";
            let filtered = students.filter(s => s.group === curatorGroup);
            let grid = document.getElementById('studentsGrid');
            if (grid) {
                grid.innerHTML = filtered.map(s => `
                    <div class="student-card" style="background:#fff5f9; border-radius:40px; padding:8px 16px; cursor:pointer; ${selectedStudentId === s.id ? 'border:2px solid #e87fb0;' : ''}" onclick="selectStudent('${s.id}')">
                        <span style="background:#e87fb0; display:inline-block; width:30px; height:30px; border-radius:50%; text-align:center; line-height:30px; color:white;">${s.name.charAt(0)}</span>
                        <span>${s.name}</span>
                    </div>
                `).join('');
            }
        }
        
        window.selectStudent = function(id) {
            selectedStudentId = id;
            updateUI();
            showStudentsList();
            renderChatMessages();
            updateStudentSelect();
        };
        
        function updateStudentSelect() {
            let curatorGroup = curatorGroups[currentUser.email] || "";
            let filtered = students.filter(s => s.group === curatorGroup);
            let select = document.getElementById('studentForGradeSelect');
            if (select) {
                select.innerHTML = filtered.map(s => `<option value="${s.id}" ${selectedStudentId === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                select.onchange = function() {
                    if (this.value) {
                        selectedStudentId = this.value;
                        updateUI();
                        renderChatMessages();
                    }
                };
            }
        }
        
        function renderUsersTable() {
            let parents = users.filter(u => u.role === 'parent');
            let container = document.getElementById('usersTableContainer');
            if (container) {
                container.innerHTML = `<table style="width:100%; border-collapse:collapse;">
                    <thead><tr><th>Имя</th><th>Email</th><th>Студент</th><th>Группа</th><th></th></tr></thead>
                    <tbody>${parents.map(p => {
                        let student = students.find(s => s.parentEmail === p.email);
                        return `<tr><td>${p.name}</td><td>${p.email}</td><td>${student?.name || "—"}</td><td>${student?.group || "—"}</td>
                        <td><button class="delete-user-btn" data-email="${p.email}" style="background:#ffe0f0; border:none; padding:5px 12px; border-radius:20px; cursor:pointer;">🗑️</button></td></tr>`;
                    }).join('')}</tbody>
                </table>`;
                document.querySelectorAll('.delete-user-btn').forEach(btn => {
                    btn.onclick = () => {
                        let email = btn.dataset.email;
                        users = users.filter(u => u.email !== email);
                        saveAll();
                        renderUsersTable();
                        alert('Удалено');
                    };
                });
            }
        }
        
        // ЧАТ
        function renderChatMessages() {
            let container = document.getElementById('chatMessagesPreview');
            if (!container) return;
            let student = getStudentById(selectedStudentId);
            let filtered = chatMessages.filter(m => !student || m.studentId === student.id || !m.studentId);
            container.innerHTML = filtered.slice(-15).map(msg => `
                <div style="margin-bottom:8px; text-align:${msg.sender === 'parent' ? 'right' : 'left'};">
                    <span style="display:inline-block; background:${msg.sender === 'parent' ? '#ffe0f0' : '#f0dce8'}; padding:8px 14px; border-radius:20px; max-width:80%;">${msg.text}</span>
                    <div style="font-size:11px; color:#999;">${msg.time}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessage(text, sender, senderName) {
            let studentId = null;
            if (currentUser?.role === 'curator') studentId = selectedStudentId;
            else if (currentUser?.role === 'parent') {
                let s = getStudentForParent(currentUser.email);
                if (s) studentId = s.id;
            }
            if (!studentId) return;
            chatMessages.push({
                text, sender, senderName,
                time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
                studentId
            });
            saveAll();
            renderChatMessages();
        }
        
        function initChat() {
            let sendBtn = document.getElementById('sendChatBtn');
            let input = document.getElementById('chatInput');
            if (sendBtn) {
                let newBtn = sendBtn.cloneNode(true);
                sendBtn.parentNode.replaceChild(newBtn, sendBtn);
                newBtn.onclick = () => {
                    let msg = input?.value.trim();
                    if (msg && currentUser) {
                        addMessage(msg, currentUser.role === 'parent' ? 'parent' : 'curator', currentUser.name);
                        if (input) input.value = '';
                    }
                };
            }
            if (input) {
                input.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        let msg = input.value.trim();
                        if (msg && currentUser) {
                            addMessage(msg, currentUser.role === 'parent' ? 'parent' : 'curator', currentUser.name);
                            input.value = '';
                        }
                    }
                };
            }
        }
        
        // Управление куратора
        function initCuratorControls() {
            let addGrade = document.getElementById('addGradeBtn');
            let addAbsence = document.getElementById('addAbsenceBtn');
            let msgDiv = document.getElementById('curatorSuccessMsg');
            if (addGrade) {
                let nb = addGrade.cloneNode(true);
                addGrade.parentNode.replaceChild(nb, addGrade);
                nb.onclick = () => {
                    let student = getStudentById(selectedStudentId);
                    if (student) {
                        let subj = document.getElementById('subjectSelect').value;
                        let grade = parseInt(document.getElementById('gradeSelect').value);
                        let weight = document.getElementById('isControl').checked ? 2 : 1;
                        if (!student.grades) student.grades = {};
                        if (!student.grades[subj]) student.grades[subj] = [];
                        student.grades[subj].push({ value: grade, date: new Date().toISOString().split('T')[0], weight: weight });
                        saveAll();
                        updateUI();
                        msgDiv.style.display = 'block';
                        msgDiv.innerHTML = `✅ Оценка ${grade} добавлена`;
                        setTimeout(() => msgDiv.style.display = 'none', 2000);
                    }
                };
            }
            if (addAbsence) {
                let nb = addAbsence.cloneNode(true);
                addAbsence.parentNode.replaceChild(nb, addAbsence);
                nb.onclick = () => {
                    let student = getStudentById(selectedStudentId);
                    if (student) {
                        let date = document.getElementById('absenceDate').value;
                        let type = document.getElementById('absenceType').value;
                        if (!student.absences) student.absences = [];
                        if (!student.absences.find(a => a.date === date)) {
                            student.absences.push({ date, type });
                            saveAll();
                            updateUI();
                            msgDiv.style.display = 'block';
                            msgDiv.innerHTML = `📅 Пропуск добавлен`;
                            setTimeout(() => msgDiv.style.display = 'none', 2000);
                        } else {
                            msgDiv.style.display = 'block';
                            msgDiv.innerHTML = '⚠️ Пропуск уже есть';
                            setTimeout(() => msgDiv.style.display = 'none', 2000);
                        }
                    }
                };
            }
        }
        
        document.getElementById('setCuratorGroupBtn')?.addEventListener('click', () => {
            let newGroup = document.getElementById('curatorGroupInput').value.trim();
            if (newGroup && currentUser) {
                curatorGroups[currentUser.email] = newGroup;
                saveAll();
                updateUI();
            }
        });
        
        // АВТОРИЗАЦИЯ
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.onclick = () => {
                let target = tab.dataset.tab;
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('loginForm').classList.toggle('hidden', target !== 'login');
                document.getElementById('registerForm').classList.toggle('hidden', target !== 'register');
            };
        });
        
        document.getElementById('regRole').onchange = function() {
            let isParent = this.value === 'parent';
            document.getElementById('parentFields').style.display = isParent ? 'block' : 'none';
            document.getElementById('curatorFields').style.display = isParent ? 'none' : 'block';
        };
        document.getElementById('regRole').dispatchEvent(new Event('change'));
        
        document.getElementById('doRegisterBtn').onclick = () => {
            let name = document.getElementById('regName').value.trim();
            let email = document.getElementById('regEmail').value.trim();
            let role = document.getElementById('regRole').value;
            let pwd = document.getElementById('regPassword').value;
            let regError = document.getElementById('regError');
            if (!name || !email || !pwd) { regError.innerText = 'Заполните поля'; return; }
            if (pwd.length < 6) { regError.innerText = 'Пароль минимум 6 символов'; return; }
            if (users.find(u => u.email === email)) { regError.innerText = 'Email уже существует'; return; }
            if (role === 'parent') {
                let childName = document.getElementById('regChildName').value.trim();
                let groupNum = document.getElementById('regGroupNumber').value.trim();
                if (!childName) { regError.innerText = 'Укажите ФИО студента'; return; }
                if (!groupNum) { regError.innerText = 'Укажите группу'; return; }
                let existing = students.find(s => s.name === childName);
                if (!existing) {
                    students.push({ id: `s${Date.now()}`, name: childName, group: groupNum, parentEmail: email, parentName: name, grades: {}, absences: [] });
                } else if (existing.parentEmail && existing.parentEmail !== email) {
                    regError.innerText = 'Студент уже привязан';
                    return;
                } else {
                    existing.parentEmail = email;
                    existing.parentName = name;
                    existing.group = groupNum;
                }
            } else if (role === 'curator') {
                let curatorGroup = document.getElementById('regCuratorGroup').value.trim();
                if (curatorGroup) curatorGroups[email] = curatorGroup;
            }
            users.push({ id: `u${Date.now()}`, name, email, password: pwd, role });
            saveAll();
            alert('Регистрация успешна! Войдите.');
            document.querySelector('.auth-tab[data-tab="login"]').click();
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = '';
        };
        
        document.getElementById('doLoginBtn').onclick = () => {
            let email = document.getElementById('loginEmail').value.trim();
            let pwd = document.getElementById('loginPassword').value;
            let user = users.find(u => u.email === email && u.password === pwd);
            if (!user) { document.getElementById('loginError').innerText = 'Неверный email или пароль'; return; }
            setCurrentUser({ id: user.id, name: user.name, email: user.email, role: user.role });
            if (user.role === 'parent') {
                let s = getStudentForParent(user.email);
                if (s) selectedStudentId = s.id;
            } else if (user.role === 'curator') {
                let curatorGroup = curatorGroups[user.email] || "";
                let filtered = students.filter(s => s.group === curatorGroup);
                if (filtered.length > 0) selectedStudentId = filtered[0].id;
            }
            showDashboard();
        };
        
        document.getElementById('logoutBtnMain').onclick = () => { clearCurrentUser(); showAuth(); };
        
        function getDetailedPage() {
            let student = getStudentById(selectedStudentId);
            if (!student) return '<div>Нет данных</div>';
            let rows = '';
            for (let s of ALL_SUBJECTS) {
                let grades = student.grades?.[s] || [];
                let avg = grades.length > 0 ? (grades.reduce((a,b) => a + (typeof b === 'object' ? b.value : b), 0) / grades.length).toFixed(1) : "—";
                rows += `<tr><td>📚 ${s}</td><td>${avg}</td></tr>`;
            }
            return `<div class="card"><div class="card-title">📖 Успеваемость: ${student.name}</div><table style="width:100%;"><tbody>${rows}</tbody></table><button class="back-link" style="margin-top:15px; background:none; border:none; color:#e87fb0; cursor:pointer;" onclick="showMain()">← Назад</button></div>`;
        }
        
        function getAttendancePage() {
            let student = getStudentById(selectedStudentId);
            if (!student) return '<div>Нет данных</div>';
            let days = '';
            (student.absences || []).slice().reverse().forEach(a => {
                days += `<div style="background:#fff5f9; padding:8px 12px; border-radius:20px; margin-bottom:8px;"><span>📅 ${a.date}</span><span style="float:right">${a.type}</span></div>`;
            });
            return `<div class="card"><div class="card-title">📅 Посещаемость: ${student.name}</div>${days || '<div>Нет пропусков</div>'}<button class="back-link" style="margin-top:15px; background:none; border:none; color:#e87fb0; cursor:pointer;" onclick="showMain()">← Назад</button></div>`;
        }
        
        let mainDash = document.getElementById('mainDashboard');
        let dynCont = document.getElementById('dynamic-page-content');
        let navBtns = document.querySelectorAll('.nav-btn');
        
        function showDetail(pageId) {
            document.querySelector('.main-dashboard')?.remove();
            let content = pageId === 'detailed-progress' ? getDetailedPage() : getAttendancePage();
            dynCont.innerHTML = content;
            dynCont.style.display = 'block';
            navBtns.forEach(btn => {
                if (btn.dataset.page === pageId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        function showMain() {
            dynCont.style.display = 'none';
            dynCont.innerHTML = '';
            navBtns.forEach(btn => {
                if (btn.dataset.page === 'dashboard') btn.classList.add('active');
                else btn.classList.remove('active');
            });
            updateUI();
            renderChatMessages();
        }
        
        function initNav() {
            showMain();
            navBtns.forEach(btn => {
                btn.removeEventListener('click', navHandler);
                btn.addEventListener('click', navHandler);
            });
        }
        
        function navHandler(e) {
            let page = this.dataset.page;
            if (page === 'dashboard') showMain();
            else showDetail(page);
        }
        
        function showDashboard() {
            if (currentUser) {
                document.getElementById('authBlock').style.display = 'none';
                document.getElementById('dashboardBlock').classList.add('active');
                document.getElementById('dashboardBlock').style.display = 'block';
                updateUI();
                initChat();
                initNav();
                initCuratorControls();
            } else showAuth();
        }
        
        function showAuth() {
            document.getElementById('authBlock').style.display = 'block';
            document.getElementById('dashboardBlock').classList.remove('active');
            document.getElementById('dashboardBlock').style.display = 'none';
        }
        
        saveAll();
        if (getCurrentUser()) showDashboard();
        else showAuth();
    </script>
</body>
</html>
