<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Колледж | Успеваемость, посещаемость</title>
    <style>

            --primary: #e87fb0;

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .auth-container { max-width: 520px; margin: 0 auto; animation: fadeInUp 0.5s ease; }
        .auth-tabs { display: flex; gap: 20px; background: rgba(255,245,249,0.9); padding: 8px; border-radius: 70px; margin-bottom: 28px; }
        .auth-tab { flex: 1; background: transparent; border: none; font-size: 1.05rem; font-weight: 700; padding: 14px 24px; cursor: pointer; color: var(--text-muted); border-radius: 60px; transition: all 0.3s; }
        .auth-tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 8px 20px rgba(232,127,176,0.35); }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .auth-form.hidden { display: none; }
        .auth-input, .auth-select { padding: 18px 24px; border: 2px solid rgba(255,208,228,0.6); border-radius: 60px; font-size: 1rem; background: rgba(255,255,255,0.95); width: 100%; transition: all 0.2s; }
        .auth-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(232,127,176,0.15); }
        .auth-btn { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none; border-radius: 60px; padding: 18px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; }

        .auth-error { color: var(--warning); font-size: 0.85rem; text-align: center; background: rgba(255,224,240,0.9); padding: 10px; border-radius: 50px; }
        .dashboard-content { display: none; }
        .dashboard-content.active { display: block; animation: fadeIn 0.6s ease; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; background: rgba(255,245,249,0.8); padding: 14px 24px; border-radius: 70px; border: 1px solid rgba(255,255,255,0.5); }
        .date-badge { background: linear-gradient(135deg, #ffe0f0, #ffd4e8); padding: 8px 20px; border-radius: 60px; font-size: 0.9rem; font-weight: 600; color: var(--primary-dark); }
        .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .user-avatar { width: 55px; height: 55px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: white; font-weight: bold; cursor: pointer; border: 3px solid white; box-shadow: 0 5px 15px rgba(232,127,176,0.4); transition: all 0.2s; }
        .user-avatar:hover { transform: scale(1.05); }
        .user-greeting { font-weight: 600; color: var(--primary-dark); font-size: 1rem; background: rgba(255,255,255,0.6); padding: 6px 16px; border-radius: 40px; }
        .user-role-badge { padding: 6px 16px; border-radius: 60px; font-size: 0.75rem; font-weight: 700; }
        .user-role-badge.parent { background: linear-gradient(135deg, #e0f0ff, #cce4ff); color: #4a7a9e; }
        .user-role-badge.curator { background: linear-gradient(135deg, #ffe0f0, #ffd0e4); color: var(--primary-dark); }
        .logout-btn { background: rgba(255,224,240,0.8); border: none; padding: 8px 22px; border-radius: 60px; color: var(--primary-dark); font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        .logout-btn:hover { background: #ffd0e4; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 56px; max-width: 520px; width: 90%; padding: 35px; max-height: 90vh; overflow-y: auto; animation: fadeInUp 0.3s ease; box-shadow: 0 25px 50px rgba(0,0,0,0.2); border: 1px solid rgba(232,127,176,0.2); }

        .profile-field input:focus { outline: none; border-color: var(--primary); }

        .avatar-emoji:hover { transform: scale(1.1); background: #ffe0f0; }
        .avatar-emoji.selected { border-color: var(--primary); background: #ffe0f0; }

        .curator-groups-manager { background: rgba(255,240,248,0.9); border-radius: 48px; padding: 22px; margin-bottom: 25px; border: 2px solid #ffd9ec; }

        .subjects-manager { background: rgba(255,240,248,0.9); border-radius: 48px; padding: 22px; margin-bottom: 25px; border: 2px solid #ffd9ec; }

        .remove-subject-btn { background: none; border: none; cursor: pointer; color: var(--warning); font-size: 1rem; }
        .add-subject-input { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; align-items: center; }

        .add-subject-input input { flex: 1; padding: 10px 16px; border: 2px solid #ffcce0; border-radius: 60px; font-family: inherit; }

        .chats-list { background: rgba(255,255,255,0.9); border-radius: 48px; padding: 22px; margin-bottom: 25px; border: 1px solid var(--border); }

        .chat-avatar { width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.3rem; font-weight: bold; }

        .student-card:hover { background: rgba(255,240,248,0.95); }

        .student-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1.1rem; }
        .no-students-message { background: rgba(255,240,248,0.9); border-radius: 56px; padding: 70px 20px; text-align: center; margin-bottom: 30px; border: 2px solid #ffd9ec; }

        .all-grades-section { background: rgba(255,255,255,0.9); border-radius: 48px; padding: 24px; margin-bottom: 28px; border: 1px solid rgba(255,255,255,0.5); }

        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }

        .subject-chart-section { background: rgba(255,255,255,0.9); border-radius: 48px; padding: 24px; margin-bottom: 28px; border: 1px solid rgba(255,255,255,0.5); }
        .subject-chart-container { margin-top: 20px; height: 320px; }
        .distribution-container { background: rgba(255,255,255,0.9); border-radius: 48px; padding: 24px; margin-bottom: 28px; border: 1px solid rgba(255,255,255,0.5); }
        .grade-distribution-bar { background: rgba(0,0,0,0.05); border-radius: 40px; height: 40px; overflow: hidden; margin: 10px 0; }
        .grade-distribution-fill { height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 15px; color: #4a2c3a; font-weight: bold; transition: width 0.6s; border-radius: 40px; }
        .grade-item { margin-bottom: 20px; }
        .grade-label { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }

        @media (max-width: 768px) { .main-dashboard { grid-template-columns: 1fr; } }
        .card { background: rgba(255,255,255,0.92); border-radius: 48px; padding: 28px 26px; box-shadow: 0 15px 35px rgba(232,127,176,0.1); border: 1px solid rgba(255,255,255,0.6); transition: all 0.3s; }

        .progress-bar-container { background: #f0dce8; border-radius: 40px; height: 12px; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 40px; height: 100%; width: 0%; transition: width 0.6s; }
        .chat-container-modern { background: rgba(254,248,252,0.95); border-radius: 40px; overflow: hidden; border: 1px solid rgba(255,255,255,0.5); }
        .chat-header { padding: 18px 24px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .chat-messages-modern { max-height: 380px; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; background: rgba(254,250,253,0.8); }
        .message-modern { display: flex; gap: 14px; max-width: 85%; }

        .message-modern.curator { align-self: flex-start; }
        .message-avatar { width: 42px; height: 42px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }

<body>
<div class="app-container" id="app">
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>👤 Мой профиль</h3><button class="close-modal" onclick="closeProfileModal()">×</button></div>
            <div class="profile-field"><label>Аватар</label><div class="avatar-options" id="avatarOptions"></div></div>
            <div class="profile-field"><label>Имя и фамилия</label><input type="text" id="profileName" placeholder="Иван Иванов"></div>
            <div class="profile-field" id="profileChildField" style="display: none;"><label>ФИО студента</label><input type="text" id="profileChildName" placeholder="Иванов Иван Иванович"></div>
            <div class="profile-field" id="profileGroupField" style="display: none;"><label>Группа студента</label><input type="text" id="profileGroup" placeholder="П-201"></div>
            <div class="profile-field"><label>Email</label><input type="email" id="profileEmail" readonly style="background:#f5f5f5;"></div>
            <button class="save-profile-btn" onclick="saveProfileChanges()">💾 Сохранить изменения</button>
        </div>
    </div>

    <div id="authBlock">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">🌸 Вход</button>
                <button class="auth-tab" data-tab="register">✨ Регистрация</button>
            </div>
            <div id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                <button id="doLoginBtn" class="auth-btn">🌟 Войти</button>
                <div id="loginError" class="auth-error"></div>
            </div>
            <div id="registerForm" class="auth-form hidden">
                <input type="text" id="regName" class="auth-input" placeholder="Имя и фамилия (только русские буквы)">
                <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                <select id="regRole" class="auth-select"><option value="parent">👨‍👩‍👧 Родитель</option><option value="curator">📚 Куратор</option></select>
                <div id="parentFields"><input type="text" id="regChildName" class="auth-input" placeholder="ФИО студента"><input type="text" id="regGroupNumber" class="auth-input" placeholder="Номер группы (П-201)"></div>
                <div id="curatorFields" style="display: none;"><input type="text" id="regCuratorGroup" class="auth-input" placeholder="Номер группы (можно добавить позже)"></div>
                <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (мин. 6 символов)">
                <button id="doRegisterBtn" class="auth-btn">✨ Зарегистрироваться</button>
                <div id="regError" class="auth-error"></div>
            </div>
        </div>
    </div>

    <div id="dashboardBlock" class="dashboard-content">
        <div class="dashboard-header">
            <div class="date-badge" id="currentDateBadge">📅 </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar" onclick="openProfileModal()">🌸</div>
                <span class="user-greeting">Привет, <span id="userNameSpan"></span>!</span>
                <span id="userRoleBadge" class="user-role-badge"></span>
                <button id="logoutBtnMain" class="logout-btn">🚪 Выйти</button>
            </div>
        </div>
        <div id="mainDashboard">
            <div style="text-align: center; padding: 50px; color: var(--primary-dark);">Загрузка...</div>
        </div>
    </div>
</div>

<script>
// Базовые предметы (без музыки и ИЗО)
const BASE_SUBJECTS = ["Математика","Русский язык","Литература","Физика","Химия","Биология","История","Обществознание","Английский","Информатика","География","Физкультура","Технология"];

// Глобальные данные
let students = [];
let users = [];
let chatMessages = [];
let curatorGroups = {};
let groupSubjects = {};
let userAvatars = {};
let currentUser = null;

function saveAll() {
    localStorage.setItem('students', JSON.stringify(students));
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
    localStorage.setItem('curatorGroups', JSON.stringify(curatorGroups));
    localStorage.setItem('groupSubjects', JSON.stringify(groupSubjects));
    localStorage.setItem('userAvatars', JSON.stringify(userAvatars));
}

function loadData() {
    students = JSON.parse(localStorage.getItem('students')) || [];
    users = JSON.parse(localStorage.getItem('users')) || [];
    chatMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
    curatorGroups = JSON.parse(localStorage.getItem('curatorGroups')) || {};
    groupSubjects = JSON.parse(localStorage.getItem('groupSubjects')) || {};
    userAvatars = JSON.parse(localStorage.getItem('userAvatars')) || {};
}
loadData();

function getSubjectsForGroup(group) {
    if (groupSubjects[group] && groupSubjects[group].length > 0) {
        return groupSubjects[group];
    }
    return [...BASE_SUBJECTS];
}

function updateCurrentDate() {
    const dateElement = document.getElementById('currentDateBadge');
    if (dateElement) {
        const today = new Date();
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        dateElement.innerHTML = `📅 ${today.getDate()} ${months[today.getMonth()]} • ${days[today.getDay()]}`;
    }
}

function openProfileModal() {
    if (!currentUser) return;
    document.getElementById('profileName').value = currentUser.name;
    document.getElementById('profileEmail').value = currentUser.email;
    const student = students.find(s => s.parentEmail === currentUser.email);
    if (student) { 
        document.getElementById('profileChildField').style.display = 'block'; 
        document.getElementById('profileGroupField').style.display = 'block'; 
        document.getElementById('profileChildName').value = student.name; 
        document.getElementById('profileGroup').value = student.group || ""; 
    } else { 
        document.getElementById('profileChildField').style.display = 'none'; 
        document.getElementById('profileGroupField').style.display = 'none'; 
    }
    const avatarOptions = document.getElementById('avatarOptions');
    const avatars = ["🌸", "😊", "🌟", "⭐", "💖", "🌺", "🍎", "📚", "🎓", "🐱", "🐶", "🦊", "🐼", "🦄", "🐨"];
    avatarOptions.innerHTML = avatars.map(a => `<div class="avatar-emoji ${userAvatars[currentUser.email] === a ? 'selected' : ''}" onclick="selectAvatar('${a}')">${a}</div>`).join('');
    document.getElementById('profileModal').classList.add('active');
}
function closeProfileModal() { document.getElementById('profileModal').classList.remove('active'); }
function selectAvatar(avatar) { 
    userAvatars[currentUser.email] = avatar; 
    saveAll(); 
    document.getElementById('userAvatar').innerHTML = avatar; 
    closeProfileModal(); 
    openProfileModal(); 
}
function saveProfileChanges() {
    const newName = document.getElementById('profileName').value.trim();
    const nameRegex = /^[А-Яа-я\s]+$/;
    if (newName && !nameRegex.test(newName)) { alert('Имя должно содержать только русские буквы'); return; }
    if (newName) { 
        const userIndex = users.findIndex(u => u.email === currentUser.email); 
        if (userIndex !== -1) { 
            users[userIndex].name = newName; 
            currentUser.name = newName; 
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            saveAll(); 
            document.getElementById('userNameSpan').innerText = newName; 
        } 
    }
    const student = students.find(s => s.parentEmail === currentUser.email);
    if (student) { 
        const newChildName = document.getElementById('profileChildName').value.trim(); 
        const newGroup = document.getElementById('profileGroup').value.trim(); 
        if (newChildName && nameRegex.test(newChildName)) student.name = newChildName;
        if (newGroup) student.group = newGroup;
        saveAll(); 
    }
    closeProfileModal();
    alert('Профиль обновлён!');
}

function showDashboard() {
    if (!currentUser) {
        document.getElementById('authBlock').style.display = 'block';
        document.getElementById('dashboardBlock').classList.remove('active');
        document.getElementById('dashboardBlock').style.display = 'none';
        return;
    }
    
    document.getElementById('userNameSpan').innerText = currentUser.name;
    document.getElementById('userAvatar').innerHTML = userAvatars[currentUser.email] || "🌸";
    const badge = document.getElementById('userRoleBadge');
    badge.innerText = currentUser.role === 'parent' ? 'Родитель' : 'Куратор';
    badge.className = `user-role-badge ${currentUser.role === 'parent' ? 'parent' : 'curator'}`;
    
    document.getElementById('authBlock').style.display = 'none';
    document.getElementById('dashboardBlock').classList.add('active');
    document.getElementById('dashboardBlock').style.display = 'block';
    updateCurrentDate();
    
    let html = '';
    
    if (currentUser.role === 'parent') {
        const student = students.find(s => s.parentEmail === currentUser.email);
        if (!student) {
            html = '<div class="no-students-message"><div class="icon">👨‍🎓</div><h3>Нет добавленных студентов</h3><p>Обратитесь к куратору для привязки студента.</p></div>';
        } else {
            html = `
                <div style="background: linear-gradient(135deg, rgba(255,240,248,0.9), rgba(255,232,244,0.9)); border-radius: 40px; padding: 16px 24px; margin-bottom: 22px;">
                    <span>🎓 <strong>${student.name}</strong></span>
                    <span style="margin-left: 20px; background: #ffe0f0; padding: 6px 16px; border-radius: 40px;">Группа ${student.group}</span>
                </div>
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value">—</div><div class="stat-label">Средний балл</div></div>
                    <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value">${student.absences?.length || 0}</div><div class="stat-label">Пропуски</div></div>
                    <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-value">${getSubjectsForGroup(student.group).length}</div><div class="stat-label">Предметов</div></div>
                </div>
                <div class="all-grades-section"><div class="section-title">📋 История оценок</div><div style="text-align:center; padding:40px;">У вас пока нет оценок</div></div>
            `;
        }
    } else if (currentUser.role === 'curator') {
        const groups = curatorGroups[currentUser.email] || [];
        const myStudents = students.filter(s => groups.includes(s.group));
        html = `
            <div class="curator-groups-manager">
                <div style="font-weight: 700; margin-bottom: 10px;">📚 Мои группы</div>
                <div id="curatorGroupsList">${groups.map(g => `<span class="group-tag">📁 ${g} <button class="remove-group-btn" data-group="${g}">✖</button></span>`).join('')}</div>
                <div class="add-group-input"><input type="text" id="newGroupName" placeholder="Название новой группы"><button id="addGroupBtn" class="curator-btn">➕ Добавить</button></div>
            </div>
            <div class="students-list"><div style="font-weight:700;">👨‍🎓 Студенты (${myStudents.length})</div><div id="studentsGrid">${myStudents.map(s => `<div class="student-card">${s.name} (${s.group})</div>`).join('')}</div></div>
        `;
    }
    
    document.getElementById('mainDashboard').innerHTML = html;
    
    // Назначаем обработчики
    document.querySelectorAll('.remove-group-btn').forEach(btn => {
        btn.onclick = () => {
            const group = btn.dataset.group;
            curatorGroups[currentUser.email] = (curatorGroups[currentUser.email] || []).filter(g => g !== group);
            saveAll();
            showDashboard();
        };
    });
    
    document.getElementById('addGroupBtn')?.addEventListener('click', () => {
        const newGroup = document.getElementById('newGroupName').value.trim();
        if (newGroup) {
            const groups = curatorGroups[currentUser.email] || [];
            if (!groups.includes(newGroup)) {
                curatorGroups[currentUser.email] = [...groups, newGroup];
                if (!groupSubjects[newGroup]) groupSubjects[newGroup] = [...BASE_SUBJECTS];
                saveAll();
                showDashboard();
                document.getElementById('newGroupName').value = '';
            } else alert('Такая группа уже есть');
        }
    });
}

// Регистрация
document.getElementById('regRole').onchange = function() { 
    const isParent = this.value === 'parent'; 
    document.getElementById('parentFields').style.display = isParent ? 'block' : 'none'; 
    document.getElementById('curatorFields').style.display = isParent ? 'none' : 'block'; 
};
document.getElementById('regRole').dispatchEvent(new Event('change'));

document.querySelectorAll('.auth-tab').forEach(tab => { 
    tab.onclick = function() { 
        const target = this.dataset.tab; 
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active')); 
        this.classList.add('active'); 
        document.getElementById('loginForm').classList.toggle('hidden', target !== 'login'); 
        document.getElementById('registerForm').classList.toggle('hidden', target !== 'register'); 
    }; 
});

function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
function validateRussianName(name) { return /^[А-Яа-я\s]+$/.test(name); }

document.getElementById('doRegisterBtn').onclick = function() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const role = document.getElementById('regRole').value;
    const pwd = document.getElementById('regPassword').value;
    const regError = document.getElementById('regError');
    
    if (!name || !email || !pwd) { regError.innerText = 'Заполните все поля'; return; }
    if (pwd.length < 6) { regError.innerText = 'Пароль должен быть минимум 6 символов'; return; }
    if (!validateEmail(email)) { regError.innerText = 'Введите корректный email'; return; }
    if (!validateRussianName(name)) { regError.innerText = 'Имя должно содержать только русские буквы'; return; }
    if (users.find(u => u.email === email)) { regError.innerText = 'Пользователь с таким email уже существует'; return; }
    
    if (role === 'parent') {
        const childName = document.getElementById('regChildName').value.trim();
        const groupNum = document.getElementById('regGroupNumber').value.trim();
        if (!childName) { regError.innerText = 'Укажите ФИО студента'; return; }
        if (!validateRussianName(childName)) { regError.innerText = 'ФИО студента должно содержать только русские буквы'; return; }
        if (!groupNum) { regError.innerText = 'Укажите номер группы студента'; return; }
        
        const existing = students.find(s => s.name === childName);
        if (!existing) {
            students.push({ id: 's' + Date.now(), name: childName, group: groupNum, parentEmail: email, parentName: name, grades: {}, absences: [] });
        } else if (existing.parentEmail && existing.parentEmail !== email) {
            regError.innerText = 'Этот студент уже привязан к другому родителю';
            return;
        } else {
            existing.parentEmail = email;
            existing.parentName = name;
            existing.group = groupNum;
        }
    } else if (role === 'curator') {
        const curatorGroup = document.getElementById('regCuratorGroup').value.trim();
        if (curatorGroup) {
            curatorGroups[email] = [curatorGroup];
            if (!groupSubjects[curatorGroup]) groupSubjects[curatorGroup] = [...BASE_SUBJECTS];
        } else {
            curatorGroups[email] = [];
        }
    }
    
    users.push({ id: 'u' + Date.now(), name: name, email: email, password: pwd, role: role });
    saveAll();
    alert('Регистрация успешна! Войдите.');
    document.querySelector('.auth-tab[data-tab="login"]').click();
    document.getElementById('loginEmail').value = email;
    document.getElementById('loginPassword').value = '';
};

document.getElementById('doLoginBtn').onclick = function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const user = users.find(u => u.email === email && u.password === pwd);
    
    if (!user) {
        document.getElementById('loginError').innerText = 'Неверный email или пароль';
        return;
    }
    
    currentUser = { id: user.id, name: user.name, email: user.email, role: user.role };
    localStorage.setItem('currentUser', JSON.stringify(currentUser));
    showDashboard();
};

document.getElementById('logoutBtnMain').onclick = function() {
    localStorage.removeItem('currentUser');
    currentUser = null;
    showDashboard();
};

// Запуск
updateCurrentDate();
const savedUser = localStorage.getItem('currentUser');
if (savedUser) {
    currentUser = JSON.parse(savedUser);
}
showDashboard();
</script>
</body>
</html>
