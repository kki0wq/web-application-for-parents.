<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колледж | Успеваемость</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef0f7 0%, #ffe4f0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #c45a8c; margin-bottom: 20px; }
        .auth-form { max-width: 400px; margin: 0 auto; }
        input, select, button {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            border: 2px solid #ffe0f0;
            border-radius: 60px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #e87fb0, #f0a0c5);
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { opacity: 0.9; }
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 12px; background: #fff0f8; border-radius: 60px; cursor: pointer; }
        .tab.active { background: linear-gradient(135deg, #e87fb0, #f0a0c5); color: white; }
        .hidden { display: none; }
        .error { color: #e06b9e; text-align: center; margin-top: 10px; }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: #fff5f9;
            border-radius: 60px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #e87fb0, #f0a0c5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 25px 0;
        }
        .stat-card {
            background: #fff5f9;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: bold; color: #e87fb0; }
        .card {
            background: #fff5f9;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
        }
        .card-title { font-weight: bold; font-size: 20px; margin-bottom: 15px; color: #c45a8c; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ffe0f0; }
        .grade-badge {
            background: #ffe0f0;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-bar select, .filter-bar input { width: auto; min-width: 150px; }
        .group-tag {
            background: #ffe0f0;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 5px;
        }
        .student-card {
            background: #fff5f9;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
            margin: 5px;
            cursor: pointer;
        }
        .student-card.active {
            background: linear-gradient(135deg, #e87fb0, #f0a0c5);
            color: white;
        }
        .chat-box {
            background: #fff5f9;
            border-radius: 32px;
            padding: 20px;
            margin-top: 20px;
        }
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .message {
            padding: 10px 15px;
            margin: 8px;
            border-radius: 20px;
            max-width: 70%;
        }
        .message.parent {
            background: linear-gradient(135deg, #e87fb0, #f0a0c5);
            color: white;
            margin-left: auto;
        }
        .message.curator {
            background: white;
            border: 1px solid #ffe0f0;
        }
        .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn-sm { width: auto; padding: 8px 20px; }
        .nav-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .nav-btn {
            width: auto;
            padding: 12px 30px;
            background: #fff0f8;
            color: #c45a8c;
        }
        .nav-btn.active {
            background: linear-gradient(135deg, #e87fb0, #f0a0c5);
            color: white;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Авторизация -->
    <div id="authSection">
        <h1 style="text-align:center">🌸 Колледж</h1>
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Вход</div>
            <div class="tab" onclick="showTab('register')">Регистрация</div>
        </div>
        <div id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="doLogin()">Войти</button>
            <div id="loginError" class="error"></div>
        </div>
        <div id="registerForm" class="auth-form hidden">
            <input type="text" id="regName" placeholder="Имя и фамилия">
            <input type="email" id="regEmail" placeholder="Email">
            <select id="regRole">
                <option value="parent">Родитель</option>
                <option value="curator">Куратор</option>
            </select>
            <div id="parentFields">
                <input type="text" id="regChildName" placeholder="ФИО студента">
                <input type="text" id="regGroupNumber" placeholder="Группа (П-201)">
            </div>
            <div id="curatorFields" class="hidden">
                <input type="text" id="regCuratorGroup" placeholder="Номер группы (можно позже)">
            </div>
            <input type="password" id="regPassword" placeholder="Пароль (мин 6)">
            <button onclick="doRegister()">Зарегистрироваться</button>
            <div id="regError" class="error"></div>
        </div>
    </div>

    <!-- Дашборд -->
    <div id="dashboardSection" class="hidden">
        <div class="dashboard-header">
            <div><span id="currentDate"></span></div>
            <div class="flex">
                <div class="avatar" id="userAvatar" onclick="openProfile()">🌸</div>
                <span>Привет, <span id="userName"></span>!</span>
                <span id="userRoleBadge"></span>
                <button class="btn-sm" onclick="logout()">Выйти</button>
            </div>
        </div>
        <div id="mainContent"></div>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showPage('main')">📋 Главная</button>
            <button class="nav-btn" onclick="showPage('grades')">📈 Успеваемость</button>
            <button class="nav-btn" onclick="showPage('attendance')">📅 Посещаемость</button>
        </div>
    </div>
</div>

<script>
// ========== ДАННЫЕ ==========
let students = JSON.parse(localStorage.getItem('students')) || [];
let users = JSON.parse(localStorage.getItem('users')) || [];
let messages = JSON.parse(localStorage.getItem('messages')) || [];
let curatorGroups = JSON.parse(localStorage.getItem('curatorGroups')) || {};
let groupSubjects = JSON.parse(localStorage.getItem('groupSubjects')) || {};
let userAvatars = JSON.parse(localStorage.getItem('userAvatars')) || {};
let currentUser = null;
let selectedStudentId = null;
let selectedChatStudentId = null;

const BASE_SUBJECTS = ["Математика","Русский язык","Литература","Физика","Химия","Биология","История","Обществознание","Английский","Информатика","География","Физкультура","Технология"];

function saveAll() {
    localStorage.setItem('students', JSON.stringify(students));
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('messages', JSON.stringify(messages));
    localStorage.setItem('curatorGroups', JSON.stringify(curatorGroups));
    localStorage.setItem('groupSubjects', JSON.stringify(groupSubjects));
    localStorage.setItem('userAvatars', JSON.stringify(userAvatars));
}

function getSubjects(group) {
    return groupSubjects[group] && groupSubjects[group].length ? groupSubjects[group] : [...BASE_SUBJECTS];
}

function getStudentById(id) { return students.find(s => s.id === id); }
function getStudentForParent(email) { return students.find(s => s.parentEmail === email); }

function avgGrade(student) {
    if (!student?.grades) return "—";
    let sum = 0, count = 0;
    for (let subj in student.grades) {
        if (Array.isArray(student.grades[subj])) {
            for (let g of student.grades[subj]) {
                let val = g.value || g;
                let w = g.weight || 1;
                sum += val * w;
                count += w;
            }
        }
    }
    return count === 0 ? "—" : (sum / count).toFixed(2);
}

// ========== АВТОРИЗАЦИЯ ==========
function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
}

document.getElementById('regRole').onchange = function() {
    const isParent = this.value === 'parent';
    document.getElementById('parentFields').classList.toggle('hidden', !isParent);
    document.getElementById('curatorFields').classList.toggle('hidden', isParent);
};

function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const user = users.find(u => u.email === email && u.password === pwd);
    if (!user) {
        document.getElementById('loginError').innerText = 'Неверный email или пароль';
        return;
    }
    currentUser = { id: user.id, name: user.name, email: user.email, role: user.role };
    localStorage.setItem('currentUser', JSON.stringify(currentUser));
    if (user.role === 'parent') {
        const s = getStudentForParent(user.email);
        if (s) selectedStudentId = s.id;
    }
    showDashboard();
}

function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const role = document.getElementById('regRole').value;
    const pwd = document.getElementById('regPassword').value;
    const err = document.getElementById('regError');
    
    if (!name || !email || !pwd) { err.innerText = 'Заполните все поля'; return; }
    if (pwd.length < 6) { err.innerText = 'Пароль минимум 6 символов'; return; }
    if (users.find(u => u.email === email)) { err.innerText = 'Email уже существует'; return; }
    
    if (role === 'parent') {
        const childName = document.getElementById('regChildName').value.trim();
        const group = document.getElementById('regGroupNumber').value.trim();
        if (!childName || !group) { err.innerText = 'Заполните данные студента'; return; }
        const existing = students.find(s => s.name === childName);
        if (!existing) {
            students.push({ id: 's' + Date.now(), name: childName, group, parentEmail: email, parentName: name, grades: {}, absences: [] });
        } else if (existing.parentEmail && existing.parentEmail !== email) {
            err.innerText = 'Студент уже привязан к другому родителю';
            return;
        } else {
            existing.parentEmail = email;
            existing.parentName = name;
            existing.group = group;
        }
    } else {
        const curatorGroup = document.getElementById('regCuratorGroup').value.trim();
        curatorGroups[email] = curatorGroup ? [curatorGroup] : [];
        if (curatorGroup && !groupSubjects[curatorGroup]) groupSubjects[curatorGroup] = [...BASE_SUBJECTS];
    }
    users.push({ id: 'u' + Date.now(), name, email, password: pwd, role });
    saveAll();
    alert('Регистрация успешна! Войдите.');
    document.getElementById('loginEmail').value = email;
    document.getElementById('loginPassword').value = '';
    document.querySelector('.tab').click();
}

function logout() {
    localStorage.removeItem('currentUser');
    currentUser = null;
    document.getElementById('authSection').classList.remove('hidden');
    document.getElementById('dashboardSection').classList.add('hidden');
}

// ========== ОСНОВНОЙ ИНТЕРФЕЙС ==========
function showDashboard() {
    document.getElementById('authSection').classList.add('hidden');
    document.getElementById('dashboardSection').classList.remove('hidden');
    document.getElementById('userName').innerText = currentUser.name;
    document.getElementById('userAvatar').innerHTML = userAvatars[currentUser.email] || "🌸";
    document.getElementById('userRoleBadge').innerText = currentUser.role === 'parent' ? 'Родитель' : 'Куратор';
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ru', {day:'numeric', month:'long'});
    
    if (currentUser.role === 'parent') renderParentView();
    else renderCuratorView();
    showPage('main');
}

function renderParentView() {
    const student = getStudentForParent(currentUser.email);
    if (!student) {
        document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:50px">👨‍🎓 Нет привязанного студента</div>';
        return;
    }
    selectedStudentId = student.id;
    const avg = avgGrade(student);
    const absences = student.absences?.length || 0;
    
    document.getElementById('mainContent').innerHTML = `
        <div style="background:#fff0f8;border-radius:40px;padding:16px;margin-bottom:20px">
            🎓 <strong>${student.name}</strong> | Группа ${student.group}
        </div>
        <div class="stats">
            <div class="stat-card"><div class="stat-value">${avg}</div><div>Средний балл</div></div>
            <div class="stat-card"><div class="stat-value">${absences}</div><div>Пропуски</div></div>
            <div class="stat-card"><div class="stat-value">${getSubjects(student.group).length}</div><div>Предметов</div></div>
        </div>
        <div class="card">
            <div class="card-title">💬 Чат с куратором</div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="flex"><input type="text" id="chatInput" placeholder="Сообщение..." style="flex:1"><button onclick="sendMessage()" style="width:auto;padding:14px 25px">Отправить</button></div>
        </div>
    `;
    renderChat();
}

function renderCuratorView() {
    const myGroups = curatorGroups[currentUser.email] || [];
    const myStudents = students.filter(s => myGroups.includes(s.group));
    
    let groupsHtml = '';
    for (let g of myGroups) {
        groupsHtml += `<div><strong>📁 ${g}</strong><div style="margin-top:8px">${getSubjects(g).map(s => `<span class="grade-badge" style="margin:3px">${s}</span>`).join('')}</div></div>`;
    }
    
    document.getElementById('mainContent').innerHTML = `
        <div class="card">
            <div class="card-title">📚 Мои группы</div>
            <div id="groupsList">${myGroups.map(g => `<span class="group-tag">${g} <button onclick="removeGroup('${g}')">✖</button></span>`).join('')}</div>
            <div class="flex" style="margin-top:12px"><input type="text" id="newGroup" placeholder="Новая группа"><button onclick="addGroup()" class="btn-sm">➕ Добавить</button></div>
        </div>
        <div class="card">
            <div class="card-title">📚 Предметы для групп</div>
            ${groupsHtml || '<div>Нет групп</div>'}
            <div class="flex" style="margin-top:12px">
                <select id="groupForSubject"><option value="">Выберите группу</option>${myGroups.map(g => `<option value="${g}">${g}</option>`).join('')}</select>
                <input type="text" id="newSubject" placeholder="Новый предмет">
                <button onclick="addSubject()" class="btn-sm">➕ Добавить</button>
            </div>
        </div>
        <div class="card">
            <div class="card-title">👨‍🎓 Студенты (${myStudents.length})</div>
            <div id="studentsList">${myStudents.map(s => `<span class="student-card" onclick="selectStudent('${s.id}')">${s.name} (${s.group})</span>`).join('')}</div>
        </div>
        <div class="card">
            <div class="card-title">💬 Чаты с родителями</div>
            <div id="chatsList">${myStudents.map(s => `<span class="student-card" onclick="selectChat('${s.id}')">💬 ${s.name}</span>`).join('')}</div>
        </div>
        <div id="curatorPanel" class="card hidden">
            <div class="card-title">🔧 Управление оценками</div>
            <div class="flex"><label style="min-width:100px">Ученик:</label><select id="gradeStudent"></select></div>
            <div class="flex"><label>Предмет:</label><select id="gradeSubject"></select></div>
            <div class="flex"><label>Оценка:</label><select id="gradeValue"><option>5</option><option>4</option><option>3</option><option>2</option></select></div>
            <div class="flex"><label>Тип:</label><label><input type="radio" name="gradeType" value="normal" checked> Обычная</label><label><input type="radio" name="gradeType" value="control"> Контрольная (×2)</label></div>
            <div class="flex"><label>Дата:</label><input type="date" id="gradeDate"></div>
            <div class="flex"><label>Коммент:</label><input type="text" id="gradeComment" placeholder="Комментарий"></div>
            <button onclick="addGrade()">➕ Поставить оценку</button>
            <hr style="margin:15px 0">
            <div class="flex"><label>Пропуск:</label><input type="date" id="absenceDate"><select id="absenceType"><option>болезнь</option><option>уважительная</option><option>неуважительная</option></select><button onclick="addAbsence()">📌 Добавить</button></div>
            <div id="curatorMsg" class="error" style="margin-top:10px"></div>
        </div>
        <div id="chatBox" class="card hidden">
            <div class="card-title">💬 <span id="chatTitle">Чат</span></div>
            <div id="chatMessagesCurator" class="chat-messages"></div>
            <div class="flex"><input type="text" id="chatInputCurator" placeholder="Сообщение..." style="flex:1"><button onclick="sendCuratorMessage()" style="width:auto">Отправить</button></div>
        </div>
    `;
}

function selectStudent(id) {
    selectedStudentId = id;
    document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    const student = getStudentById(id);
    if (student) {
        document.getElementById('curatorPanel').classList.remove('hidden');
        const subjects = getSubjects(student.group);
        document.getElementById('gradeStudent').innerHTML = `<option value="${id}">${student.name}</option>`;
        document.getElementById('gradeSubject').innerHTML = subjects.map(s => `<option>${s}</option>`).join('');
        document.getElementById('gradeDate').value = new Date().toISOString().split('T')[0];
    }
}

function selectChat(id) {
    selectedChatStudentId = id;
    const student = getStudentById(id);
    document.getElementById('chatTitle').innerText = `Чат с родителем ${student?.name || ''}`;
    document.getElementById('chatBox').classList.remove('hidden');
    renderCuratorChat();
}

function renderCuratorChat() {
    const container = document.getElementById('chatMessagesCurator');
    if (!container) return;
    const msgs = messages.filter(m => m.studentId === selectedChatStudentId);
    container.innerHTML = msgs.map(m => `
        <div class="message ${m.sender}" style="margin:8px 0;padding:10px 15px;border-radius:20px;max-width:70%;${m.sender === 'parent' ? 'margin-left:auto;background:#e87fb0;color:white' : 'background:white;border:1px solid #ffe0f0'}">
            <div>${m.text}</div>
            <div style="font-size:11px;opacity:0.7">${m.time}</div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

function sendCuratorMessage() {
    const inp = document.getElementById('chatInputCurator');
    if (!inp.value.trim() || !selectedChatStudentId) return;
    messages.push({
        text: inp.value.trim(),
        sender: 'curator',
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        studentId: selectedChatStudentId
    });
    saveAll();
    renderCuratorChat();
    inp.value = '';
}

function sendMessage() {
    const student = getStudentById(selectedStudentId);
    if (!student) return;
    const inp = document.getElementById('chatInput');
    if (!inp.value.trim()) return;
    messages.push({
        text: inp.value.trim(),
        sender: 'parent',
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        studentId: selectedStudentId
    });
    saveAll();
    renderChat();
    inp.value = '';
}

function renderChat() {
    const container = document.getElementById('chatMessages');
    if (!container) return;
    const msgs = messages.filter(m => m.studentId === selectedStudentId);
    container.innerHTML = msgs.map(m => `
        <div class="message ${m.sender}" style="margin:8px 0;padding:10px 15px;border-radius:20px;max-width:70%;${m.sender === 'parent' ? 'margin-left:auto;background:#e87fb0;color:white' : 'background:white;border:1px solid #ffe0f0'}">
            <div>${m.text}</div>
            <div style="font-size:11px;opacity:0.7">${m.time}</div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

function addGrade() {
    if (!selectedStudentId) { alert('Выберите ученика'); return; }
    const student = getStudentById(selectedStudentId);
    const subject = document.getElementById('gradeSubject').value;
    const value = parseInt(document.getElementById('gradeValue').value);
    const date = document.getElementById('gradeDate').value || new Date().toISOString().split('T')[0];
    const comment = document.getElementById('gradeComment').value;
    const isControl = document.querySelector('input[name="gradeType"]:checked').value === 'control';
    const weight = isControl ? 2 : 1;
    
    if (!student.grades) student.grades = {};
    if (!student.grades[subject]) student.grades[subject] = [];
    student.grades[subject].push({ value, date, comment, weight });
    saveAll();
    document.getElementById('curatorMsg').innerText = `✅ Оценка ${value} добавлена`;
    setTimeout(() => document.getElementById('curatorMsg').innerText = '', 2000);
    document.getElementById('gradeComment').value = '';
}

function addAbsence() {
    if (!selectedStudentId) { alert('Выберите ученика'); return; }
    const student = getStudentById(selectedStudentId);
    const date = document.getElementById('absenceDate').value || new Date().toISOString().split('T')[0];
    const type = document.getElementById('absenceType').value;
    if (!student.absences) student.absences = [];
    if (student.absences.find(a => a.date === date)) {
        alert('Пропуск за эту дату уже есть');
        return;
    }
    student.absences.push({ date, type });
    saveAll();
    document.getElementById('curatorMsg').innerText = `📅 Пропуск добавлен`;
    setTimeout(() => document.getElementById('curatorMsg').innerText = '', 2000);
}

function addGroup() {
    const newGroup = document.getElementById('newGroup').value.trim();
    if (newGroup && !curatorGroups[currentUser.email].includes(newGroup)) {
        curatorGroups[currentUser.email].push(newGroup);
        if (!groupSubjects[newGroup]) groupSubjects[newGroup] = [...BASE_SUBJECTS];
        saveAll();
        renderCuratorView();
    } else alert('Группа уже есть или поле пусто');
}

function removeGroup(group) {
    curatorGroups[currentUser.email] = curatorGroups[currentUser.email].filter(g => g !== group);
    saveAll();
    renderCuratorView();
}

function addSubject() {
    const group = document.getElementById('groupForSubject').value;
    const newSubj = document.getElementById('newSubject').value.trim();
    if (group && newSubj && !groupSubjects[group].includes(newSubj)) {
        groupSubjects[group].push(newSubj);
        saveAll();
        renderCuratorView();
        document.getElementById('newSubject').value = '';
    } else alert('Выберите группу и введите новый предмет');
}

// ========== СТРАНИЦЫ ==========
function showPage(page) {
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    if (page === 'main') {
        if (currentUser.role === 'parent') renderParentView();
        else renderCuratorView();
        return;
    }
    
    const student = getStudentById(selectedStudentId);
    if (!student) { alert('Нет выбранного студента'); return; }
    
    if (page === 'grades') {
        const subjects = getSubjects(student.group);
        let rows = '';
        for (let s of subjects) {
            const grades = student.grades?.[s] || [];
            let sum = 0, cnt = 0;
            for (let g of grades) { sum += g.value * (g.weight||1); cnt += (g.weight||1); }
            const avg = cnt ? (sum/cnt).toFixed(1) : '—';
            rows += `<tr><td>${s}</td><td>${avg}</td><td>${grades.length ? grades[grades.length-1].value : '—'}</td></tr>`;
        }
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="card-title">📖 Успеваемость: ${student.name}</div>
                <table><thead><tr><th>Предмет</th><th>Средний балл</th><th>Последняя оценка</th></tr></thead><tbody>${rows}</tbody></table>
            </div>
        `;
    } else if (page === 'attendance') {
        let list = '';
        (student.absences || []).slice().reverse().forEach(a => {
            list += `<div style="padding:12px;border-bottom:1px solid #ffe0f0">📅 ${a.date} — ${a.type}</div>`;
        });
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="card-title">📅 Посещаемость: ${student.name}</div>
                ${list || '<div style="padding:20px;text-align:center">✨ Нет пропусков</div>'}
            </div>
        `;
    }
}

function openProfile() {
    alert('Профиль: ' + currentUser.name + '\nEmail: ' + currentUser.email);
}

// Инициализация
const savedUser = localStorage.getItem('currentUser');
if (savedUser) {
    currentUser = JSON.parse(savedUser);
    showDashboard();
}
</script>
