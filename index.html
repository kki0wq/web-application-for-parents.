<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Колледж | Успеваемость</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #e87fb0;
            --primary-dark: #c45a8c;
            --primary-light: #f0a0c5;
            --text-dark: #4a2c3a;
            --text-muted: #c27096;
            --border: #ffe0f0;
            --success: #2d6a4f;
            --warning: #e06b9e;
            --payment-paid: #a8e6cf;
            --payment-unpaid: #ffb3ba;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef0f7 0%, #ffe4f0 40%, #ffd9e8 100%);
            color: var(--text-dark);
            padding: 20px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            padding: 28px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        @media (max-width: 768px) { .app-container { padding: 16px; } }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .floating-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; font-size: 16px; opacity: 0.1; animation: floatHeart linear infinite; }
        @keyframes floatHeart { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 20% { opacity: 0.1; } 80% { opacity: 0.1; } 100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; } }
        .star { position: absolute; font-size: 12px; opacity: 0.08; animation: twinkle 4s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.03; } 100% { opacity: 0.12; } }
        
        .auth-container { max-width: 480px; margin: 0 auto; }
        .auth-tabs { display: flex; gap: 16px; background: #fff0f6; padding: 6px; border-radius: 60px; margin-bottom: 24px; }
        .auth-tab { flex: 1; background: transparent; border: none; padding: 14px; font-weight: 700; cursor: pointer; border-radius: 50px; color: #c27096; }
        .auth-tab.active { background: #e87fb0; color: white; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form.hidden { display: none; }
        .auth-input, .auth-select { padding: 16px 20px; border: 2px solid #ffe0f0; border-radius: 50px; font-size: 1rem; background: white; }
        .auth-btn { background: linear-gradient(135deg, #e87fb0, #f0a0c5); color: white; border: none; border-radius: 50px; padding: 16px; font-weight: 800; cursor: pointer; }
        .auth-error { color: #e06b9e; text-align: center; background: #ffe0f0; padding: 10px; border-radius: 50px; }
        
        .dashboard-content { display: none; }
        .dashboard-content.active { display: block; animation: fadeIn 0.4s; }
        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
            background: #fff5f9; padding: 12px 20px; border-radius: 60px; margin-bottom: 24px;
        }
        .date-badge { background: #ffe0f0; padding: 6px 18px; border-radius: 40px; font-size: 0.85rem; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #e87fb0, #f0a0c5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; border: 2px solid white; }
        .logout-btn { background: #ffe0f0; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 48px; max-width: 500px; width: 90%; padding: 30px; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 24px; }
        .close-modal { background: none; border: none; font-size: 1.8rem; cursor: pointer; }
        .profile-field { margin-bottom: 20px; }
        .profile-field input { width: 100%; padding: 14px 18px; border: 2px solid #ffe0f0; border-radius: 50px; }
        .avatar-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .avatar-option { width: 50px; height: 50px; background: #ffe0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; cursor: pointer; border: 2px solid transparent; }
        .avatar-option.selected { border-color: #e87fb0; }
        .save-btn, .delete-account-btn { background: linear-gradient(135deg, #e87fb0, #f0a0c5); color: white; border: none; border-radius: 50px; padding: 14px; width: 100%; margin-top: 12px; cursor: pointer; }
        .delete-account-btn { background: #e06b9e; }
        
        .card-block { background: rgba(255,255,255,0.92); border-radius: 32px; padding: 20px; margin-bottom: 24px; }
        .card-title { font-weight: 800; font-size: 1.2rem; color: #c45a8c; margin-bottom: 16px; }
        
        .students-list, .chats-list, .users-list { background: rgba(255,255,255,0.92); border-radius: 32px; padding: 20px; margin-bottom: 24px; }
        .student-item, .user-item, .chat-item { background: #fff5f9; border-radius: 60px; padding: 12px 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .student-item:hover, .chat-item:hover { background: #ffe0f0; transform: translateX(4px); }
        .student-item.active, .chat-item.active { background: #ffe0f0; border: 1px solid #e87fb0; }
        .student-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #e87fb0, #f0a0c5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .delete-user-btn { background: #e06b9e; color: white; border: none; border-radius: 40px; padding: 6px 14px; font-size: 0.7rem; cursor: pointer; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: rgba(255,255,255,0.9); border-radius: 28px; padding: 20px; text-align: center; }
        .stat-icon { font-size: 2rem; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #e87fb0; }
        
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .filter-select { padding: 8px 16px; border: 2px solid #ffe0f0; border-radius: 40px; background: white; }
        .curator-btn { background: linear-gradient(135deg, #e87fb0, #f0a0c5); color: white; border: none; border-radius: 40px; padding: 8px 20px; cursor: pointer; }
        
        .grades-table { width: 100%; border-collapse: collapse; }
        .grades-table th, .grades-table td { padding: 12px 8px; border-bottom: 1px solid #ffe0f0; text-align: left; }
        .grade-badge { background: #ffe0f0; padding: 4px 12px; border-radius: 30px; font-weight: 700; }
        
        .payment-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-top: 16px; }
        .payment-card { background: white; border-radius: 20px; padding: 12px; text-align: center; cursor: pointer; border: 2px solid #ffe0f0; }
        .payment-card.paid { background: #a8e6cf; border-color: #2d6a4f; }
        .payment-card.unpaid { background: #ffb3ba; border-color: #e06b9e; }
        
        .curator-panel { background: #fff0f8; border-radius: 32px; padding: 24px; margin-top: 20px; }
        .control-group { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .control-group label { font-weight: 700; color: #c27096; min-width: 90px; }
        .curator-select, .curator-input { padding: 10px 16px; border: 2px solid #ffe0f0; border-radius: 40px; background: white; }
        .grade-type-group { display: flex; gap: 12px; align-items: center; }
        
        .main-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; margin-bottom: 24px; }
        .info-card { background: rgba(255,255,255,0.94); border-radius: 32px; padding: 24px; }
        .progress-bar-container { background: #f0dce8; border-radius: 30px; height: 12px; margin: 16px 0; }
        .progress-bar { background: #e87fb0; border-radius: 30px; height: 100%; width: 0%; transition: width 0.4s; }
        
        .chat-container { background: white; border-radius: 28px; overflow: hidden; }
        .chat-header { padding: 16px 20px; background: #fff5f9; border-bottom: 1px solid #ffe0f0; display: flex; align-items: center; gap: 12px; }
        .chat-messages { max-height: 360px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #fefafc; }
        .message { display: flex; gap: 12px; max-width: 80%; }
        .message.parent { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; }
        .message.parent .message-avatar { background: #e87fb0; color: white; }
        .message-bubble { padding: 10px 16px; border-radius: 24px; background: white; border: 1px solid #ffe0f0; }
        .message.parent .message-bubble { background: #e87fb0; color: white; border: none; }
        .chat-input { padding: 16px 20px; background: white; border-top: 1px solid #ffe0f0; display: flex; gap: 12px; }
        .chat-input input { flex: 1; padding: 12px 18px; border: 2px solid #ffe0f0; border-radius: 40px; }
        .send-btn { background: #e87fb0; color: white; border: none; border-radius: 40px; padding: 12px 28px; cursor: pointer; }
        
        .bottom-nav { display: flex; justify-content: center; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 2px dashed #ffe0f0; }
        .nav-btn { background: white; border: 2px solid #ffe0f0; padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; }
        .nav-btn.active { background: #e87fb0; border-color: #e87fb0; color: white; }
        
        .group-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .subject-tag { background: #ffe0f0; padding: 6px 12px; border-radius: 40px; display: inline-flex; align-items: center; gap: 8px; margin: 4px; }
        
        .notification { position: fixed; bottom: 20px; right: 20px; background: #e87fb0; color: white; padding: 12px 20px; border-radius: 50px; z-index: 1000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .detail-page { background: rgba(255,255,255,0.95); border-radius: 32px; padding: 28px; }
        .detail-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; color: #c45a8c; border-left: 5px solid #e87fb0; padding-left: 20px; }
        .back-link { background: none; border: none; color: #e87fb0; font-weight: 700; margin-top: 20px; cursor: pointer; padding: 10px 20px; }
        .empty-message { text-align: center; padding: 60px; background: rgba(255,240,248,0.9); border-radius: 32px; }
    </style>
</head>
<body>
<div id="floatingBg" class="floating-bg"></div>
<div class="app-container" id="app">

<div id="profileModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>👤 Профиль</h3><button class="close-modal" onclick="closeProfileModal()">×</button></div><div class="profile-field"><label>Имя</label><input type="text" id="profileName"></div><div class="profile-field"><label>Email</label><input type="email" id="profileEmail" readonly style="background:#f5f5f5;"></div><div class="profile-field"><label>Аватар</label><div class="avatar-selector" id="avatarSelector"></div></div><button class="save-btn" onclick="saveProfileChanges()">💾 Сохранить</button><button class="delete-account-btn" onclick="deleteAccount()">🗑️ Удалить аккаунт</button></div></div>

<div id="authBlock"><div class="auth-container"><div class="auth-tabs"><button class="auth-tab active" data-tab="login">🌸 Вход</button><button class="auth-tab" data-tab="register">✨ Регистрация</button></div><div id="loginForm" class="auth-form"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button id="doLoginBtn" class="auth-btn">🌟 Войти</button><div id="loginError" class="auth-error"></div></div><div id="registerForm" class="auth-form hidden"><input type="text" id="regName" placeholder="Имя"><input type="email" id="regEmail" placeholder="Email"><select id="regRole"><option value="parent">Родитель</option><option value="curator">Куратор</option></select><div id="parentFields"><input type="text" id="regChildName" placeholder="ФИО студента"><input type="text" id="regGroupNumber" placeholder="Группа"></div><div id="curatorFields" style="display:none"><input type="text" id="regCuratorGroup" placeholder="Ваша группа"></div><input type="password" id="regPassword" placeholder="Пароль (мин.6)"><button id="doRegisterBtn" class="auth-btn">✨ Зарегистрироваться</button><div id="regError" class="auth-error"></div></div></div></div>

<div id="dashboardBlock" class="dashboard-content">
    <div class="dashboard-header"><div class="date-badge" id="currentDateBadge"></div><div class="user-info"><div class="user-avatar" id="userAvatar" onclick="openProfileModal()">🌸</div><span>Привет, <span id="userNameSpan"></span>!</span><span id="userRoleBadge"></span><button id="logoutBtn" class="logout-btn">🚪 Выйти</button></div></div>

    <div id="paymentsBlock" class="card-block" style="display:none"><div class="card-title">💰 Оплата колледжа</div><div id="paymentGrid" class="payment-grid"></div><div id="paymentMsg" style="margin-top:12px;text-align:center;padding:8px;background:#e8f4e6;border-radius:40px;display:none;"></div></div>

    <div id="curatorArea" style="display:none">
        <div class="card-block"><div class="group-bar"><strong>📚 Мои группы:</strong><select id="groupSelect" class="curator-select"></select><button id="deleteGroupBtn" class="curator-btn">🗑️ Удалить</button><input type="text" id="newGroupInput" placeholder="Новая группа" style="padding:8px 16px;border-radius:40px;border:2px solid #ffe0f0;"><button id="addGroupBtn" class="curator-btn">➕ Добавить</button></div><div><strong>📖 Предметы:</strong><div id="subjectsList" style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;"></div><input type="text" id="newSubjectInput" placeholder="Новый предмет" style="padding:8px 16px;border-radius:40px;border:2px solid #ffe0f0;"><button id="addSubjectBtn" class="curator-btn">➕ Добавить</button></div></div>
        <div id="parentsBlock" class="card-block" style="display:none"><div class="card-title">👥 Родители группы</div><div id="parentsList"></div></div>
        <div id="studentsBlock" class="card-block" style="display:none"><div class="card-title">👨‍🎓 Студенты</div><div id="studentsList"></div></div>
        <div id="chatsBlock" class="card-block" style="display:none"><div class="card-title">💬 Чаты с родителями</div><div id="chatsList"></div></div>
    </div>

    <div id="statsBlock" style="display:none">
        <div style="background:linear-gradient(135deg,#fff0f8,#ffe4f0);border-radius:32px;padding:14px 20px;margin-bottom:20px;display:flex;justify-content:space-between;"><span>🎓 <strong id="currentStudentName"></strong></span><span id="studentGroupBadge" style="background:#ffe0f0;padding:4px 14px;border-radius:40px;"></span></div>
        <div class="stats-row"><div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value" id="avgScore">—</div><div class="stat-label">Средний балл</div></div><div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value" id="absencesCount">—</div><div class="stat-label">Пропуски</div></div><div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-value" id="subjectsCount">—</div><div class="stat-label">Предметов</div></div></div>
        <div class="card-block"><div class="card-title">📋 Оценки</div><div class="filter-bar"><select id="subjectFilter"><option value="">Все предметы</option></select><button id="clearFilterBtn" class="curator-btn">Очистить</button></div><div id="gradesTable" style="max-height:300px;overflow-y:auto;"></div></div>
        <div class="card-block"><div class="card-title">📊 Распределение</div><div id="distribution"></div></div>
        <div class="main-grid" id="mainGrid">
            <div class="info-card"><div class="card-title">📊 Успеваемость</div><div><span>Средний балл:</span><span id="avgDisplay" style="font-size:1.8rem;font-weight:800;margin-left:10px;">—</span></div><div class="progress-bar-container"><div class="progress-bar" id="avgBar"></div></div><button class="nav-btn" style="width:100%;margin-top:16px;" data-page="progress">📈 Подробнее →</button></div>
            <div class="info-card"><div class="card-title">📆 Посещаемость</div><div><span>Пропуски:</span><span id="absDisplay" style="font-size:1.8rem;font-weight:800;margin-left:10px;">—</span></div><div class="progress-bar-container"><div class="progress-bar" id="attBar"></div></div><button class="nav-btn" style="width:100%;margin-top:16px;" data-page="attendance">📅 Подробнее →</button></div>
            <div class="info-card" style="grid-column:1/-1"><div class="card-title">💬 Чат</div><div class="chat-container"><div class="chat-header"><div style="width:36px;height:36px;background:#e87fb0;border-radius:50%;display:flex;align-items:center;justify-content:center;">💬</div><div><h4 id="chatTitle">Чат</h4></div></div><div id="chatMessages" class="chat-messages"></div><div class="chat-input"><input type="text" id="chatInput" placeholder="Сообщение..."><button id="sendBtn" class="send-btn">Отправить</button></div></div></div>
        </div>
    </div>
    
    <div id="emptyMessage" class="empty-message" style="display:none"><h3>Нет студентов</h3></div>
    
    <div id="curatorTools" class="curator-panel" style="display:none"><h4>🔧 Панель куратора</h4><div class="control-group"><label>Ученик:</label><select id="gradeStudentSelect" class="curator-select"></select></div><div class="control-group"><label>Оценка:</label><select id="gradeSubject" class="curator-select"></select><select id="gradeValue" class="curator-select"><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option></select><div class="grade-type-group"><label><input type="radio" name="gradeType" value="normal" checked> Обычная</label><label><input type="radio" name="gradeType" value="control"> Контрольная (×2)</label></div><input type="date" id="gradeDateInput"><input type="text" id="gradeCommentInput" placeholder="Комментарий"><button id="addGradeBtn" class="curator-btn">Поставить</button></div><div class="control-group"><label>Пропуск:</label><input type="date" id="absenceDateInput"><select id="absenceTypeSelect"><option value="болезнь">Болезнь</option><option value="уважительная">Уважительная</option><option value="неуважительная">Неуважительная</option></select><button id="addAbsenceBtn" class="curator-btn">Добавить</button></div><div id="curatorMsg" style="display:none;background:#e8f4e6;padding:10px;border-radius:40px;margin-top:12px;text-align:center;"></div></div>
    
    <nav class="bottom-nav"><button class="nav-btn active" data-page="main">📋 Главная</button><button class="nav-btn" data-page="progress">📈 Успеваемость</button><button class="nav-btn" data-page="attendance">📅 Посещаемость</button></nav>
    <div id="dynamicPage"></div>
</div>
</div>

<script>
// ДАННЫЕ
if (!localStorage.getItem('users') || JSON.parse(localStorage.getItem('users')).length === 0) {
    localStorage.setItem('users', JSON.stringify([
        { id: 'u1', name: 'ГЕННАДИЙ ДРАГОН', email: 'gennadij@dragons.ru', password: 'dragongennadij', role: 'curator' },
        { id: 'u2', name: 'МАНИЙ ДАНИС', email: 'maniy@danis.ru', password: 'maniy123', role: 'parent' },
        { id: 'u3', name: 'СУЛТАНОВ ДАНИС', email: 'sultanov@danis.ru', password: 'sultanov123', role: 'parent' },
        { id: 'u4', name: 'ЧИФ КИФ', email: 'chief@kif.ru', password: 'chiefkif', role: 'curator' }
    ]));
    localStorage.setItem('students', JSON.stringify([
        { id: 's1', name: 'Студент Маний', group: 'П-201', parentEmail: 'maniy@danis.ru', parentName: 'МАНИЙ ДАНИС', grades: {}, absences: [] },
        { id: 's2', name: 'Студент Султанов', group: 'П-202', parentEmail: 'sultanov@danis.ru', parentName: 'СУЛТАНОВ ДАНИС', grades: {}, absences: [] }
    ]));
    localStorage.setItem('curatorGroups', JSON.stringify({ 'gennadij@dragons.ru': ['П-201', 'П-202'], 'chief@kif.ru': ['П-203'] }));
    localStorage.setItem('groupSubjects', JSON.stringify({ 'П-201': ['Математика','Русский язык','Физика','Информатика','Физкультура'], 'П-202': ['Математика','Литература','Химия','Биология','Физкультура'], 'П-203': ['Математика','Английский','История','Обществознание','Физкультура'] }));
    localStorage.setItem('chatMessages', JSON.stringify([]));
    localStorage.setItem('userAvatars', JSON.stringify({}));
    localStorage.setItem('payments', JSON.stringify({}));
}

let students = JSON.parse(localStorage.getItem('students'));
let users = JSON.parse(localStorage.getItem('users'));
let chatMessages = JSON.parse(localStorage.getItem('chatMessages'));
let curatorGroups = JSON.parse(localStorage.getItem('curatorGroups'));
let groupSubjects = JSON.parse(localStorage.getItem('groupSubjects'));
let userAvatars = JSON.parse(localStorage.getItem('userAvatars'));
let payments = JSON.parse(localStorage.getItem('payments'));
let currentUser = null;
let selectedStudentId = null, selectedChatId = null, selectedGradeId = null, activeGroup = null, lastSubject = null;
const AVATARS = ["🌸","🌺","🌷","🌹","⭐","🌟","✨","💫","🐱","🦋","🌈","🍎","📚","🎓"];

function saveAll() {
    localStorage.setItem('students', JSON.stringify(students));
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
    localStorage.setItem('curatorGroups', JSON.stringify(curatorGroups));
    localStorage.setItem('groupSubjects', JSON.stringify(groupSubjects));
    localStorage.setItem('userAvatars', JSON.stringify(userAvatars));
    localStorage.setItem('payments', JSON.stringify(payments));
}

function getStudentById(id) { return students.find(s=>s.id===id); }
function getStudentForParent(email) { return students.find(s=>s.parentEmail===email); }
function getSubjects(group) { if (!groupSubjects[group]) groupSubjects[group] = ['Математика','Русский язык','Физика','Информатика','Физкультура']; return groupSubjects[group]; }
function avgGrade(st) { if(!st?.grades) return "—"; let t=0,s=0; for(let sub in st.grades) for(let g of st.grades[sub]){ let v=typeof g==='object'?g.value:g, w=(typeof g==='object'&&g.weight)?g.weight:1; s+=v*w; t+=w; } return t===0?"—":(s/t).toFixed(2); }

// ОПЛАТА
function initPayments(sid){ if(!payments[sid]){ payments[sid]={}; ['Сен','Окт','Ноя','Дек','Янв','Фев','Мар','Апр','Май','Июн'].forEach(m=>payments[sid][m]={paid:false}); saveAll(); } }
function renderPayments(){ let st=getStudentForParent(currentUser?.email); if(!st) return; initPayments(st.id); let html=Object.keys(payments[st.id]).map(m=>`<div class="payment-card ${payments[st.id][m].paid?'paid':'unpaid'}" onclick="togglePayment('${st.id}','${m}')"><div>${payments[st.id][m].paid?'✅':'❌'}</div><div>${m}</div></div>`).join(''); document.getElementById('paymentGrid').innerHTML=html; }
window.togglePayment=function(sid,m){ payments[sid][m].paid=!payments[sid][m].paid; saveAll(); renderPayments(); let msg=document.getElementById('paymentMsg'); msg.style.display='block'; msg.innerHTML=payments[sid][m].paid?`✅ ${m} оплачен!`:`❌ Оплата отменена`; setTimeout(()=>msg.style.display='none',2000); };

// УДАЛЕНИЕ РОДИТЕЛЯ
window.deleteParent=function(email,name){
    if(confirm(`Удалить родителя "${name}" из группы?`)){
        let st=students.find(s=>s.parentEmail===email && s.group===activeGroup);
        if(st){ st.parentEmail=null; st.parentName=null; saveAll(); renderParents(); renderStudents(); renderChats(); document.getElementById('curatorMsg').innerHTML=`✅ Родитель "${name}" удалён`; document.getElementById('curatorMsg').style.display='block'; setTimeout(()=>document.getElementById('curatorMsg').style.display='none',2000); }
    }
};

function renderParents(){
    if(!activeGroup || currentUser?.role!=='curator') return;
    let parents=users.filter(u=>students.some(s=>s.group===activeGroup && s.parentEmail===u.email));
    let div=document.getElementById('parentsList'), block=document.getElementById('parentsBlock');
    if(parents.length===0){ block.style.display='none'; return; }
    block.style.display='block';
    div.innerHTML=parents.map(p=>`<div class="user-item"><div><strong>${p.name}</strong><br><small>${p.email}</small></div><button class="delete-user-btn" onclick="window.deleteParent('${p.email}','${p.name.replace(/'/g,"\\'")}')">🗑️ Удалить</button></div>`).join('');
}

function renderGradesTable(){
    let st=getStudentById(selectedStudentId);
    if(!st) return;
    let grades=[];
    for(let s in st.grades) for(let g of st.grades[s]) grades.push({subject:s,value:typeof g==='object'?g.value:g,date:typeof g==='object'?g.date:"",comment:typeof g==='object'?g.comment:"",weight:typeof g==='object'?g.weight:1});
    grades.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    let filter=document.getElementById('subjectFilter')?.value;
    if(filter) grades=grades.filter(g=>g.subject===filter);
    let cont=document.getElementById('gradesTable');
    if(grades.length===0){ cont.innerHTML='<div style="text-align:center;padding:40px;">📭 Нет оценок</div>'; return; }
    cont.innerHTML=`<table class="grades-table"><thead><tr><th>Дата</th><th>Предмет</th><th>Оценка</th><th>Тип</th><th>Комментарий</th></tr></thead><tbody>${grades.map(g=>`<tr><td>${g.date||"—"}</td><td>📚 ${g.subject}</td><td><span class="grade-badge">${g.value}</span></td><td>${g.weight===2?'Контрольная ×2':'Обычная'}</td><td>${g.comment||"—"}</td></tr>`).join('')}</tbody></table>`;
}

function renderDistribution(st){
    if(!st) return;
    let cnt=[0,0,0,0],tot=0;
    for(let s in st.grades) for(let g of st.grades[s]){ let v=typeof g==='object'?g.value:g, w=(typeof g==='object'&&g.weight)?g.weight:1; if(v===5)cnt[0]+=w; else if(v===4)cnt[1]+=w; else if(v===3)cnt[2]+=w; else if(v===2)cnt[3]+=w; tot+=w; }
    let names=["Отлично","Хорошо","Удовлетворительно","Неудовлетворительно"], cols=["#a8e6cf","#b8deff","#ffd3b6","#ffb3ba"];
    let div=document.getElementById('distribution');
    if(tot===0){ div.innerHTML='<div style="text-align:center;padding:40px;">📊 Нет оценок</div>'; return; }
    div.innerHTML=names.map((n,i)=>{ let p=tot>0?(cnt[i]/tot*100).toFixed(1):0; return `<div style="margin-bottom:15px;"><div style="display:flex;justify-content:space-between;"><span>${n}</span><span>${cnt[i]} шт (${p}%)</span></div><div style="background:#eee;border-radius:30px;height:30px;"><div style="width:${p}%;background:${cols[i]};border-radius:30px;height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;">${p>15?p+'%':''}</div></div></div>`; }).join('');
}

function updateFilters(subjects){
    let fs=document.getElementById('subjectFilter');
    if(fs) fs.innerHTML='<option value="">Все предметы</option>'+subjects.map(s=>`<option value="${s}">${s}</option>`).join('');
    let gs=document.getElementById('gradeSubject');
    if(gs){ gs.innerHTML=subjects.map(s=>`<option value="${s}">📚 ${s}</option>`).join(''); if(lastSubject && subjects.includes(lastSubject)) gs.value=lastSubject; }
    document.getElementById('subjectsCount').innerText=subjects.length;
}

function displayStats(st){
    if(!st) return;
    let avg=avgGrade(st), abs=st.absences?.length||0, subs=getSubjects(st.group), avgP=avg!=="—"?parseFloat(avg)/5*100:0;
    document.getElementById('avgDisplay').innerText=avg;
    document.getElementById('avgScore').innerText=avg;
    document.getElementById('absDisplay').innerText=abs;
    document.getElementById('absencesCount').innerText=abs;
    document.getElementById('subjectsCount').innerText=subs.length;
    document.getElementById('avgBar').style.width=avgP+"%";
    document.getElementById('attBar').style.width=Math.min(100,100-(abs/50*100))+"%";
    document.getElementById('currentStudentName').innerHTML=st.name;
    document.getElementById('studentGroupBadge').innerHTML=`Группа ${st.group}`;
    updateFilters(subs);
}

function renderStudents(){
    if(!activeGroup) return;
    let group=students.filter(s=>s.group===activeGroup);
    let div=document.getElementById('studentsList'), block=document.getElementById('studentsBlock');
    if(group.length===0){ block.style.display='none'; return; }
    block.style.display='block';
    div.innerHTML=group.map(s=>`<div class="student-item ${selectedStudentId===s.id?'active':''}" onclick="selectStudent('${s.id}')"><div class="student-avatar">${s.name.charAt(0)}</div><div><strong>${s.name}</strong><br><small>${s.group}</small></div></div>`).join('');
    let sel=document.getElementById('gradeStudentSelect');
    if(sel){ sel.innerHTML='<option value="">-- Выберите ученика --</option>'+group.map(s=>`<option value="${s.id}" ${selectedGradeId===s.id?'selected':''}>${s.name}</option>`).join(''); sel.onchange=function(){ if(this.value){ selectedGradeId=this.value; selectedStudentId=this.value; selectedChatId=this.value; fullUpdate(); renderChat(); } }; }
}

function renderChats(){
    if(!activeGroup) return;
    let group=students.filter(s=>s.group===activeGroup);
    let div=document.getElementById('chatsList'), block=document.getElementById('chatsBlock');
    if(group.length===0){ block.style.display='none'; return; }
    block.style.display='block';
    div.innerHTML=group.map(st=>{ let parent=users.find(u=>u.email===st.parentEmail); let pn=parent?parent.name:(st.parentName||"Родитель"); let last=chatMessages.filter(m=>m.studentId===st.id).slice(-1)[0]; return `<div class="chat-item ${selectedChatId===st.id?'active':''}" onclick="selectChat('${st.id}')"><div class="chat-avatar" style="width:40px;height:40px;background:#e87fb0;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;">${pn.charAt(0)}</div><div><div><strong>💬 Чат с ${pn}</strong></div><div style="font-size:0.8rem;">${last?last.text.substring(0,40):'Нет сообщений'}</div></div></div>`; }).join('');
}

function renderSubjects(){
    if(!activeGroup) return;
    let subs=getSubjects(activeGroup);
    let div=document.getElementById('subjectsList');
    div.innerHTML=subs.map(s=>`<span class="subject-tag">📘 ${s} <button class="delete-subject" data-subj="${s}" style="background:none;border:none;color:#e06b9e;cursor:pointer;">✖</button></span>`).join('');
    document.querySelectorAll('.delete-subject').forEach(btn=>{ btn.onclick=()=>{ let sub=btn.dataset.subj; groupSubjects[activeGroup]=groupSubjects[activeGroup].filter(x=>x!==sub); saveAll(); renderSubjects(); updateFilters(getSubjects(activeGroup)); fullUpdate(); }; });
}

function renderGroupsSelect(){
    let groups=curatorGroups[currentUser?.email]||[];
    let sel=document.getElementById('groupSelect');
    sel.innerHTML=groups.map(g=>`<option value="${g}" ${activeGroup===g?'selected':''}>📁 ${g}</option>`).join('');
    sel.onchange=()=>{ activeGroup=sel.value; localStorage.setItem('activeGroup',activeGroup); fullUpdate(); };
    if(groups.length && !activeGroup) activeGroup=groups[0];
}

function fullUpdate(){
    if(currentUser?.role==='curator'){
        if(!activeGroup) return;
        renderStudents(); renderChats(); renderSubjects(); renderParents();
        let group=students.filter(s=>s.group===activeGroup);
        if(group.length && (!selectedStudentId || !group.find(s=>s.id===selectedStudentId))){ selectedStudentId=group[0].id; selectedChatId=selectedStudentId; selectedGradeId=selectedStudentId; }
        if(selectedStudentId){ let st=getStudentById(selectedStudentId); if(st){ displayStats(st); renderDistribution(st); } }
        renderGradesTable();
    } else if(currentUser?.role==='parent'){
        let st=getStudentForParent(currentUser.email);
        if(st){ selectedStudentId=st.id; selectedChatId=st.id; displayStats(st); renderDistribution(st); renderGradesTable(); renderChat(); }
    }
}

function selectStudent(id){ selectedStudentId=id; selectedChatId=id; selectedGradeId=id; fullUpdate(); renderChat(); }
function selectChat(id){ selectedChatId=id; selectedStudentId=id; selectedGradeId=id; fullUpdate(); renderChat(); }

function renderChat(){
    let sid=currentUser?.role==='curator'?selectedChatId:getStudentForParent(currentUser?.email)?.id;
    if(!sid) return;
    if(currentUser?.role==='curator'){ let st=getStudentById(sid); if(st){ let parent=users.find(u=>u.email===st.parentEmail); document.getElementById('chatTitle').innerHTML=`Чат с ${parent?parent.name:(st.parentName||"Родитель")}`; } }
    else{ document.getElementById('chatTitle').innerHTML=`Чат с куратором`; }
    let msgs=chatMessages.filter(m=>m.studentId===sid);
    document.getElementById('chatMessages').innerHTML=msgs.map(msg=>`<div class="message ${msg.sender==='parent'?'parent':'curator'}"><div class="message-avatar">${msg.sender==='parent'?'👨‍👩‍👧':'📚'}</div><div class="message-bubble">${msg.text}</div></div>`).join('');
    let cont=document.getElementById('chatMessages'); if(cont) cont.scrollTop=cont.scrollHeight;
}

function sendMessage(text,sender){
    let sid=currentUser?.role==='curator'?selectedChatId:getStudentForParent(currentUser?.email)?.id;
    if(!sid) return;
    chatMessages.push({text,sender,time:new Date().toLocaleTimeString(),studentId:sid});
    saveAll(); renderChat(); if(currentUser?.role==='curator') renderChats();
}

function initChat(){
    let btn=document.getElementById('sendBtn'), inp=document.getElementById('chatInput');
    if(btn){ let nb=btn.cloneNode(true); btn.parentNode.replaceChild(nb,btn); nb.onclick=()=>{ let msg=inp?.value.trim(); if(msg && currentUser){ sendMessage(msg,currentUser.role==='parent'?'parent':'curator'); inp.value=''; } }; }
    if(inp) inp.onkeypress=e=>{ if(e.key==='Enter'){ let msg=inp.value.trim(); if(msg && currentUser){ sendMessage(msg,currentUser.role==='parent'?'parent':'curator'); inp.value=''; } } };
}

function initCuratorButtons(){
    let addGrade=document.getElementById('addGradeBtn'), addAbsence=document.getElementById('addAbsenceBtn'), msgDiv=document.getElementById('curatorMsg');
    if(addGrade){ let nb=addGrade.cloneNode(true); addGrade.parentNode.replaceChild(nb,addGrade); nb.onclick=()=>{ let st=getStudentById(selectedGradeId); if(!st){ msgDiv.style.display='block'; msgDiv.innerHTML='⚠️ Выберите ученика'; setTimeout(()=>msgDiv.style.display='none',2000); return; } let subj=document.getElementById('gradeSubject').value; if(!subj){ msgDiv.style.display='block'; msgDiv.innerHTML='⚠️ Выберите предмет'; setTimeout(()=>msgDiv.style.display='none',2000); return; } lastSubject=subj; let val=parseInt(document.getElementById('gradeValue').value); let date=document.getElementById('gradeDateInput').value||new Date().toISOString().slice(0,10); let comm=document.getElementById('gradeCommentInput').value.trim(); let isCtrl=document.querySelector('input[name="gradeType"]:checked').value==='control'; let w=isCtrl?2:1; if(!st.grades) st.grades={}; if(!st.grades[subj]) st.grades[subj]=[]; st.grades[subj].push({value:val,date:date,comment:comm||"Без комментария",weight:w}); saveAll(); fullUpdate(); setTimeout(()=>{ let gs=document.getElementById('gradeSubject'); if(gs && lastSubject && [...gs.options].some(o=>o.value===lastSubject)) gs.value=lastSubject; },50); msgDiv.style.display='block'; msgDiv.innerHTML=`✅ Оценка ${val} по ${subj}${isCtrl?' (×2)':''}`; setTimeout(()=>msgDiv.style.display='none',2000); }; }
    if(addAbsence){ let nb=addAbsence.cloneNode(true); addAbsence.parentNode.replaceChild(nb,addAbsence); nb.onclick=()=>{ let st=getStudentById(selectedStudentId); if(st){ let date=document.getElementById('absenceDateInput').value||new Date().toISOString().slice(0,10); let type=document.getElementById('absenceTypeSelect').value; if(!st.absences) st.absences=[]; if(!st.absences.find(a=>a.date===date)){ st.absences.push({date,type}); saveAll(); fullUpdate(); msgDiv.style.display='block'; msgDiv.innerHTML=`📅 Пропуск добавлен`; setTimeout(()=>msgDiv.style.display='none',2000); } else { msgDiv.style.display='block'; msgDiv.innerHTML='⚠️ Пропуск уже есть'; setTimeout(()=>msgDiv.style.display='none',2000); } } }; }
}

// НАВИГАЦИЯ
let mainGrid=document.getElementById('mainGrid'), dynPage=document.getElementById('dynamicPage'), navBtns=document.querySelectorAll('.nav-btn');
function getProgressPage(){ let st=getStudentById(selectedStudentId); if(!st) return '<div class="detail-page">Нет данных</div>'; let subs=getSubjects(st.group); let rows=subs.map(s=>{ let grades=st.grades?.[s]||[]; let avg=grades.length?(grades.reduce((a,b)=>a+(typeof b==='object'?b.value*(b.weight||1):b),0)/grades.reduce((a,b)=>a+(typeof b==='object'?(b.weight||1):1),0)).toFixed(1):"—"; let last=grades[grades.length-1]; let lastVal=last?(typeof last==='object'?last.value:last):"—"; return `<tr><td>📚 ${s}</td><td>${avg}</td><td><span class="grade-badge">${lastVal}</span></td></tr>`; }).join(''); return `<div class="detail-page"><div class="detail-title">📖 Успеваемость: ${st.name}</div><table class="grades-table"><thead><tr><th>Предмет</th><th>Средний балл</th><th>Последняя оценка</th></tr></thead><tbody>${rows}</tbody></table><button class="back-link" data-back="main">← На главную</button></div>`; }
function getAttendancePage(){ let st=getStudentById(selectedStudentId); if(!st) return '<div class="detail-page">Нет данных</div>'; let days=(st.absences||[]).slice().reverse().map(a=>`<div style="padding:12px;background:#ffe0f0;border-radius:40px;margin:8px 0;">📅 ${a.date} — ${a.type}</div>`).join(''); return `<div class="detail-page"><div class="detail-title">📅 Посещаемость: ${st.name}</div>${days||'<div style="padding:20px;text-align:center;">✨ Нет пропусков</div>'}<button class="back-link" data-back="main">← На главную</button></div>`; }
function showDetail(page){ if(mainGrid) mainGrid.style.display='none'; let content=page==='progress'?getProgressPage():getAttendancePage(); dynPage.innerHTML=content; dynPage.style.display='block'; navBtns.forEach(btn=>btn.classList.toggle('active',btn.dataset.page===page)); document.querySelectorAll('.back-link').forEach(btn=>btn.onclick=()=>showMain()); }
function showMain(){ if(mainGrid) mainGrid.style.display='grid'; dynPage.style.display='none'; dynPage.innerHTML=''; navBtns.forEach(btn=>btn.classList.toggle('active',btn.dataset.page==='main')); fullUpdate(); }
function initNav(){ showMain(); navBtns.forEach(btn=>{ btn.onclick=()=>{ let p=btn.dataset.page; p==='main'?showMain():showDetail(p); }; }); }

document.getElementById('clearFilterBtn')?.addEventListener('click',()=>{ if(document.getElementById('subjectFilter')) document.getElementById('subjectFilter').value=""; renderGradesTable(); });
document.getElementById('subjectFilter')?.addEventListener('change',()=>renderGradesTable());
document.getElementById('deleteGroupBtn')?.addEventListener('click',()=>{ if(activeGroup && confirm(`Удалить группу "${activeGroup}"?`)){ let groups=curatorGroups[currentUser.email]; let idx=groups.indexOf(activeGroup); if(idx!==-1) groups.splice(idx,1); curatorGroups[currentUser.email]=groups; saveAll(); if(groups.length>0){ activeGroup=groups[0]; localStorage.setItem('activeGroup',activeGroup); } else { activeGroup=null; document.getElementById('statsBlock').style.display='none'; document.getElementById('emptyMessage').style.display='block'; } renderGroupsSelect(); fullUpdate(); } });
document.getElementById('addGroupBtn')?.addEventListener('click',()=>{ let ng=document.getElementById('newGroupInput').value.trim(); if(ng && currentUser){ let taken=false; for(let ce in curatorGroups) if(ce!==currentUser.email && curatorGroups[ce]?.includes(ng)) taken=true; if(taken){ document.getElementById('curatorMsg').innerHTML='⚠️ Группа уже закреплена'; document.getElementById('curatorMsg').style.display='block'; setTimeout(()=>document.getElementById('curatorMsg').style.display='none',2000); return; } if(!curatorGroups[currentUser.email]) curatorGroups[currentUser.email]=[]; if(!curatorGroups[currentUser.email].includes(ng)){ curatorGroups[currentUser.email].push(ng); if(!groupSubjects[ng]) groupSubjects[ng]=['Математика','Русский язык','Физика','Информатика','Физкультура']; saveAll(); renderGroupsSelect(); activeGroup=ng; fullUpdate(); document.getElementById('newGroupInput').value=''; } } });
document.getElementById('addSubjectBtn')?.addEventListener('click',()=>{ let ns=document.getElementById('newSubjectInput').value.trim(); if(ns && activeGroup && !groupSubjects[activeGroup].includes(ns)){ groupSubjects[activeGroup].push(ns); saveAll(); renderSubjects(); updateFilters(getSubjects(activeGroup)); fullUpdate(); document.getElementById('newSubjectInput').value=''; } });

document.getElementById('regRole').onchange=function(){ let isP=this.value==='parent'; document.getElementById('parentFields').style.display=isP?'block':'none'; document.getElementById('curatorFields').style.display=isP?'none':'block'; };
document.getElementById('regRole').dispatchEvent(new Event('change'));
document.querySelectorAll('.auth-tab').forEach(tab=>{ tab.onclick=()=>{ let t=tab.dataset.tab; document.querySelectorAll('.auth-tab').forEach(tt=>tt.classList.remove('active')); tab.classList.add('active'); document.getElementById('loginForm').classList.toggle('hidden',t!=='login'); document.getElementById('registerForm').classList.toggle('hidden',t!=='register'); }; });
document.getElementById('doRegisterBtn').onclick=()=>{ let name=document.getElementById('regName').value.trim(), email=document.getElementById('regEmail').value.trim(), role=document.getElementById('regRole').value, pwd=document.getElementById('regPassword').value, err=document.getElementById('regError'); if(!name||!email||!pwd){ err.innerText='Заполните все поля'; return; } if(pwd.length<6){ err.innerText='Пароль минимум 6 символов'; return; } if(users.find(u=>u.email===email)){ err.innerText='Email уже существует'; return; } if(role==='parent'){ let child=document.getElementById('regChildName').value.trim(), grp=document.getElementById('regGroupNumber').value.trim(); if(!child||!grp){ err.innerText='Заполните данные студента'; return; } let ex=students.find(s=>s.name===child); if(!ex) students.push({id:`s${Date.now()}`,name:child,group:grp,parentEmail:email,parentName:name,grades:{},absences:[]}); else if(ex.parentEmail && ex.parentEmail!==email){ err.innerText='Студент уже привязан'; return; } else { ex.parentEmail=email; ex.parentName=name; ex.group=grp; } } else { let cg=document.getElementById('regCuratorGroup').value.trim(); if(!curatorGroups[email]) curatorGroups[email]=[]; if(cg && !curatorGroups[email].includes(cg)) curatorGroups[email].push(cg); if(cg && !groupSubjects[cg]) groupSubjects[cg]=['Математика','Русский язык','Физика','Информатика','Физкультура']; } users.push({id:`u${Date.now()}`,name,email,password:pwd,role}); saveAll(); alert('Регистрация успешна!'); document.querySelector('.auth-tab[data-tab="login"]').click(); };
document.getElementById('doLoginBtn').onclick=()=>{ let email=document.getElementById('loginEmail').value.trim(), pwd=document.getElementById('loginPassword').value; let user=users.find(u=>u.email===email && u.password===pwd); if(!user){ document.getElementById('loginError').innerText='Неверный email или пароль'; return; } currentUser=user; localStorage.setItem('currentUser',JSON.stringify(user)); if(user.role==='parent'){ let st=getStudentForParent(user.email); if(st){ selectedStudentId=st.id; selectedChatId=st.id; selectedGradeId=st.id; } } if(user.role==='curator'){ if(!curatorGroups[user.email]) curatorGroups[user.email]=[]; let saved=localStorage.getItem('activeGroup'); if(saved && curatorGroups[user.email].includes(saved)) activeGroup=saved; else if(curatorGroups[user.email].length) activeGroup=curatorGroups[user.email][0]; } showDashboard(); };
document.getElementById('logoutBtn').onclick=()=>{ localStorage.removeItem('currentUser'); currentUser=null; showAuth(); };

function renderAvatarSelector(){ let cont=document.getElementById('avatarSelector'); if(!cont) return; let cur=userAvatars[currentUser?.email]||"🌸"; cont.innerHTML=AVATARS.map(av=>`<div class="avatar-option ${cur===av?'selected':''}" data-avatar="${av}">${av}</div>`).join(''); document.querySelectorAll('.avatar-option').forEach(opt=>{ opt.onclick=()=>{ document.querySelectorAll('.avatar-option').forEach(o=>o.classList.remove('selected')); opt.classList.add('selected'); }; }); }
window.deleteAccount=function(){ if(confirm('Удалить аккаунт?')){ let email=currentUser.email; users=users.filter(u=>u.email!==email); saveAll(); localStorage.removeItem('currentUser'); currentUser=null; showAuth(); closeProfileModal(); alert('Аккаунт удалён'); } };
window.openProfileModal=function(){ if(!currentUser) return; document.getElementById('profileName').value=currentUser.name; document.getElementById('profileEmail').value=currentUser.email; renderAvatarSelector(); document.getElementById('profileModal').classList.add('active'); };
window.closeProfileModal=function(){ document.getElementById('profileModal').classList.remove('active'); };
window.saveProfileChanges=function(){ let newName=document.getElementById('profileName').value.trim(); let selAv=document.querySelector('.avatar-option.selected')?.dataset.avatar; if(newName){ let idx=users.findIndex(u=>u.email===currentUser.email); if(idx!==-1){ users[idx].name=newName; currentUser.name=newName; localStorage.setItem('currentUser',JSON.stringify(currentUser)); saveAll(); document.getElementById('userNameSpan').innerText=newName; } } if(selAv){ userAvatars[currentUser.email]=selAv; saveAll(); document.getElementById('userAvatar').innerHTML=selAv; } closeProfileModal(); alert('Профиль обновлён'); };

function showDashboard(){
    if(currentUser){
        document.getElementById('authBlock').style.display='none';
        document.getElementById('dashboardBlock').classList.add('active');
        document.getElementById('userNameSpan').innerText=currentUser.name;
        document.getElementById('userAvatar').innerHTML=userAvatars[currentUser.email]||"🌸";
        let badge=document.getElementById('userRoleBadge');
        
        if(currentUser.role==='parent'){
            badge.innerText='Родитель';
            document.getElementById('curatorArea').style.display='none';
            document.getElementById('curatorTools').style.display='none';
            document.getElementById('paymentsBlock').style.display='block';
            renderPayments();
            let st=getStudentForParent(currentUser.email);
            if(st){
                document.getElementById('statsBlock').style.display='block';
                document.getElementById('emptyMessage').style.display='none';
                displayStats(st); renderDistribution(st);
                renderChat();
            } else { document.getElementById('statsBlock').style.display='none'; document.getElementById('emptyMessage').style.display='block'; }
        } else {
            badge.innerText='Куратор';
            document.getElementById('curatorArea').style.display='block';
            document.getElementById('curatorTools').style.display='block';
            document.getElementById('paymentsBlock').style.display='none';
            if(!curatorGroups[currentUser.email]) curatorGroups[currentUser.email]=[];
            renderGroupsSelect();
            if(activeGroup) fullUpdate();
            else if(curatorGroups[currentUser.email].length){ activeGroup=curatorGroups[currentUser.email][0]; fullUpdate(); }
            else { document.getElementById('statsBlock').style.display='none'; document.getElementById('emptyMessage').style.display='block'; }
        }
        let today=new Date().toISOString().slice(0,10);
        if(document.getElementById('gradeDateInput')) document.getElementById('gradeDateInput').value=today;
        if(document.getElementById('absenceDateInput')) document.getElementById('absenceDateInput').value=today;
        initChat(); initCuratorButtons(); initNav(); renderGradesTable();
    } else showAuth();
}
function showAuth(){ document.getElementById('authBlock').style.display='block'; document.getElementById('dashboardBlock').classList.remove('active'); }

function createFloating(){
    let cont=document.getElementById('floatingBg'); if(!cont) return; cont.innerHTML='';
    for(let i=0;i<40;i++){ let d=document.createElement('div'); d.className='heart'; d.innerHTML='❤️'; d.style.left=Math.random()*100+'%'; d.style.fontSize=(10+Math.random()*16)+'px'; d.style.animationDuration=(8+Math.random()*15)+'s'; d.style.animationDelay=(Math.random()*20)+'s'; cont.appendChild(d); }
    for(let i=0;i<50;i++){ let s=document.createElement('div'); s.className='star'; s.innerHTML='⭐'; s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%'; s.style.fontSize=(8+Math.random()*12)+'px'; s.style.animationDuration=(3+Math.random()*6)+'s'; s.style.animationDelay=(Math.random()*10)+'s'; cont.appendChild(s); }
}
function updateDate(){ let b=document.getElementById('currentDateBadge'); if(b) b.innerHTML=`📅 ${new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}`; }

createFloating(); updateDate(); setInterval(updateDate,60000);
saveAll();
if(localStorage.getItem('currentUser')){ currentUser=JSON.parse(localStorage.getItem('currentUser')); showDashboard(); } else showAuth();
</script>
</body>
</html>
