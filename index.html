<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Колледж | Успеваемость, посещаемость</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #e87fb0;
            --primary-dark: #c45a8c;
            --primary-light: #f0a0c5;
            --bg-light: #fff5f9;
            --text-dark: #4a2c3a;

            --warning: #e06b9e;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef0f7 0%, #ffe4f0 40%, #ffd9e8 100%);

            padding: 20px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 56px;

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .auth-container { max-width: 520px; margin: 0 auto; animation: fadeInUp 0.5s ease; }

        .auth-tab { flex: 1; background: transparent; border: none; font-size: 1.05rem; font-weight: 700; padding: 14px 24px; cursor: pointer; color: var(--text-muted); border-radius: 60px; transition: all 0.3s; }
        .auth-tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 8px 20px rgba(232,127,176,0.35); }

        .auth-form.hidden { display: none; }

        .dashboard-content.active { display: block; animation: fadeIn 0.6s ease; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; background: rgba(255,245,249,0.8); padding: 14px 24px; border-radius: 70px; border: 1px solid rgba(255,255,255,0.5); }
        .date-badge { background: linear-gradient(135deg, #ffe0f0, #ffd4e8); padding: 8px 20px; border-radius: 60px; font-size: 0.9rem; font-weight: 600; color: var(--primary-dark); }
        .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .user-avatar { width: 55px; height: 55px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: white; font-weight: bold; cursor: pointer; border: 3px solid white; box-shadow: 0 5px 15px rgba(232,127,176,0.4); transition: all 0.2s; }
        .user-avatar:hover { transform: scale(1.05); }

        .logout-btn:hover { background: #ffd0e4; }

        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 56px; max-width: 520px; width: 90%; padding: 35px; max-height: 90vh; overflow-y: auto; animation: fadeInUp 0.3s ease; box-shadow: 0 25px 50px rgba(0,0,0,0.2); border: 1px solid rgba(232,127,176,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .modal-header h3 { color: var(--primary-dark); font-size: 1.6rem; font-weight: 800; }
        .close-modal { background: none; border: none; font-size: 2rem; cursor: pointer; color: var(--text-muted); }
        .profile-field { margin-bottom: 25px; }
        .profile-field label { display: block; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; font-size: 0.9rem; }
        .profile-field input { width: 100%; padding: 15px 22px; border: 2px solid var(--border); border-radius: 60px; font-size: 1rem; font-family: inherit; }
        .avatar-options { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; justify-content: center; }

        .avatar-emoji:hover { transform: scale(1.1); background: #ffe0f0; }

        .curator-groups-manager { background: rgba(255,240,248,0.9); border-radius: 48px; padding: 22px; margin-bottom: 25px; border: 2px solid #ffd9ec; }

        .subject-tag { background: linear-gradient(135deg, #e0f0ff, #cce4ff); padding: 6px 14px; border-radius: 40px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; }

        .add-subject-input input { flex: 2; padding: 12px 16px; border: 2px solid #ffcce0; border-radius: 60px; font-family: inherit; }

        .students-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; max-height: 250px; overflow-y: auto; }

        .chat-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; font-weight: bold; }

        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

        .all-grades-section { background: rgba(255,255,255,0.9); border-radius: 48px; padding: 24px; margin-bottom: 28px; }

        .curator-btn { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none; border-radius: 60px; padding: 12px 24px; font-weight: 700; cursor: pointer; }
        .curator-panel { background: rgba(255,240,248,0.95); border-radius: 48px; padding: 24px; margin-top: 25px; border: 2px solid #ffd9ec; }

        .control-group label { font-weight: 700; color: var(--text-muted); min-width: 100px; }
        .curator-input, .curator-select { padding: 12px 18px; border: 2px solid #ffcce0; border-radius: 60px; background: white; flex: 1; min-width: 160px; }
        .grade-type-group { display: flex; gap: 15px; align-items: center; }
        .success-msg { color: var(--success); background: #e8f4e6; padding: 12px; border-radius: 60px; text-align: center; margin-top: 15px; display: none; }
        .chat-container-modern { background: rgba(254,248,252,0.95); border-radius: 40px; overflow: hidden; margin-top: 20px; }
        .chat-header { padding: 15px 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .chat-messages-modern { max-height: 350px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message-modern { display: flex; gap: 12px; max-width: 80%; }
        .message-modern.parent { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar { width: 38px; height: 38px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .message-modern.parent .message-avatar { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
        .message-bubble-modern { padding: 10px 18px; border-radius: 24px; font-size: 0.9rem; }
        .message-modern.parent .message-bubble-modern { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
        .message-modern.curator .message-bubble-modern { background: white; border: 1px solid var(--border); }
        .message-time-modern { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; margin-left: 12px; }
        .chat-input-modern { padding: 15px 20px; background: white; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .chat-input-modern input { flex: 1; padding: 12px 18px; border: 1px solid var(--border); border-radius: 60px; font-family: inherit; }
        .chat-send-btn { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none; border-radius: 60px; padding: 12px 28px; font-weight: 700; cursor: pointer; }
        .bottom-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 30px 0 20px; padding-top: 25px; border-top: 2px dashed rgba(255,224,240,0.8); }
        .nav-btn { background: rgba(255,255,255,0.9); border: 2px solid #ffd0e4; padding: 12px 28px; border-radius: 70px; font-weight: 700; color: var(--primary-dark); cursor: pointer; }
        .nav-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-color: var(--primary); color: white; }
        .dynamic-content { margin-top: 25px; animation: fadeIn 0.4s ease; }
        .detail-page { background: rgba(255,255,255,0.95); border-radius: 48px; padding: 28px; }
        .detail-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 25px; color: var(--primary-dark); border-left: 5px solid var(--primary); padding-left: 20px; }
        .subjects-table { width: 100%; border-collapse: collapse; }
        .subjects-table th, .subjects-table td { text-align: left; padding: 14px 10px; border-bottom: 1px solid var(--border); }
        .grade-badge { background: linear-gradient(135deg, #ffe0f0, #ffd4e8); padding: 6px 16px; border-radius: 40px; font-weight: 700; display: inline-block; }
        .back-link { background: none; border: none; color: var(--primary); font-weight: 700; margin-top: 25px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 60px; }
        .no-students-message { background: rgba(255,240,248,0.9); border-radius: 56px; padding: 60px 20px; text-align: center; }
        .no-students-message .icon { font-size: 4rem; margin-bottom: 15px; }
        .breadcrumbs { margin-bottom: 20px; font-size: 0.85rem; color: var(--text-muted); }
        .breadcrumbs a { color: var(--primary-dark); cursor: pointer; }
        @media (max-width: 600px) {
            .control-group, .chat-input-modern, .add-group-input, .add-subject-input { flex-direction: column; }
            .nav-btn { padding: 10px 18px; font-size: 0.8rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-container" id="app">
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>👤 Мой профиль</h3><button class="close-modal" onclick="closeProfileModal()">×</button></div>
            <div class="profile-field"><label>Аватар</label><div class="avatar-options" id="avatarOptions"></div></div>
            <div class="profile-field"><label>Имя и фамилия</label><input type="text" id="profileName" placeholder="Иван Иванов"></div>
            <div class="profile-field" id="profileChildField" style="display: none;"><label>ФИО студента</label><input type="text" id="profileChildName" placeholder="Иванов Иван Иванович"></div>
            <div class="profile-field" id="profileGroupField" style="display: none;"><label>Группа студента</label><input type="text" id="profileGroup" placeholder="П-201"></div>
            <div class="profile-field"><label>Email</label><input type="email" id="profileEmail" readonly style="background:#f5f5f5;"></div>
            <button class="save-profile-btn" onclick="saveProfileChanges()">💾 Сохранить</button>
        </div>
    </div>

    <div id="authBlock">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">🌸 Вход</button>
                <button class="auth-tab" data-tab="register">✨ Регистрация</button>
            </div>
            <div id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                <button id="doLoginBtn" class="auth-btn">🌟 Войти</button>
                <div id="loginError" class="auth-error"></div>
            </div>
            <div id="registerForm" class="auth-form hidden">
                <input type="text" id="regName" class="auth-input" placeholder="Имя и фамилия">
                <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                <select id="regRole" class="auth-select"><option value="parent">👨‍👩‍👧 Родитель</option><option value="curator">📚 Куратор</option></select>
                <div id="parentFields"><input type="text" id="regChildName" class="auth-input" placeholder="ФИО студента"><input type="text" id="regGroupNumber" class="auth-input" placeholder="Группа (П-201)"></div>
                <div id="curatorFields" style="display: none;"><input type="text" id="regCuratorGroup" class="auth-input" placeholder="Группа (можно добавить позже)"></div>
                <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (мин. 6 символов)">
                <button id="doRegisterBtn" class="auth-btn">✨ Зарегистрироваться</button>
                <div id="regError" class="auth-error"></div>
            </div>
        </div>
    </div>

    <div id="dashboardBlock" class="dashboard-content">
        <div class="dashboard-header">
            <div class="date-badge" id="currentDateBadge"></div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar" onclick="openProfileModal()">🌸</div>
                <span class="user-greeting">Привет, <span id="userNameSpan"></span>!</span>
                <span id="userRoleBadge" class="user-role-badge"></span>
                <button id="logoutBtnMain" class="logout-btn">🚪 Выйти</button>
            </div>
        </div>
        <div id="dashboardContainer"></div>
        <div class="bottom-nav">
            <button class="nav-btn active" data-page="main">📋 Главная</button>
            <button class="nav-btn" data-page="grades">📈 Успеваемость</button>
            <button class="nav-btn" data-page="attendance">📅 Посещаемость</button>
        </div>
        <div id="dynamicContent" class="dynamic-content"></div>
    </div>
</div>

<script>
// ========== БАЗОВЫЕ ПРЕДМЕТЫ (без музыки и ИЗО) ==========
const BASE_SUBJECTS = ["Математика","Русский язык","Литература","Физика","Химия","Биология","История","Обществознание","Английский","Информатика","География","Физкультура","Технология"];

// ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
let students = [];
let users = [];
let chatMessages = [];
let curatorGroups = {};
let groupSubjects = {};
let userAvatars = {};
let currentUser = null;
let selectedStudentId = null;
let selectedChatId = null;
let gradesChart = null;

// ========== СОХРАНЕНИЕ И ЗАГРУЗКА ==========
function saveAll() {
    localStorage.setItem('students', JSON.stringify(students));
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
    localStorage.setItem('curatorGroups', JSON.stringify(curatorGroups));
    localStorage.setItem('groupSubjects', JSON.stringify(groupSubjects));
    localStorage.setItem('userAvatars', JSON.stringify(userAvatars));
}

function loadData() {
    students = JSON.parse(localStorage.getItem('students')) || [];
    users = JSON.parse(localStorage.getItem('users')) || [];
    chatMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
    curatorGroups = JSON.parse(localStorage.getItem('curatorGroups')) || {};
    groupSubjects = JSON.parse(localStorage.getItem('groupSubjects')) || {};
    userAvatars = JSON.parse(localStorage.getItem('userAvatars')) || {};
}
loadData();

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function getSubjectsForGroup(group) {
    return (groupSubjects[group] && groupSubjects[group].length) ? groupSubjects[group] : [...BASE_SUBJECTS];
}

function getStudentById(id) { return students.find(s => s.id === id); }
function getStudentForParent(email) { return students.find(s => s.parentEmail === email); }
function getCuratorStudents(email) {
    const groups = curatorGroups[email] || [];
    return students.filter(s => groups.includes(s.group));
}

function avgGradeWeighted(student) {
    if (!student?.grades) return "—";
    let totalWeight = 0, sumWeighted = 0;
    for (let subj in student.grades) {
        if (Array.isArray(student.grades[subj])) {
            for (let g of student.grades[subj]) {
                let val = g.value || g;
                let weight = g.weight || 1;
                sumWeighted += val * weight;
                totalWeight += weight;
            }
        }
    }
    return totalWeight === 0 ? "—" : (sumWeighted / totalWeight).toFixed(2);
}

function getAllGrades(student) {
    let list = [];
    if (!student?.grades) return list;
    for (let subject in student.grades) {
        if (Array.isArray(student.grades[subject])) {
            for (let g of student.grades[subject]) {
                list.push({ subject, value: g.value, date: g.date, comment: g.comment, weight: g.weight || 1 });
            }
        }
    }
    return list.sort((a,b) => (b.date || "").localeCompare(a.date || ""));
}

function updateCurrentDate() {
    const el = document.getElementById('currentDateBadge');
    if (el) {
        const d = new Date();
        el.innerHTML = `📅 ${d.getDate()} ${['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()]} • ${['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][d.getDay()]}`;
    }
}

// ========== ПРОФИЛЬ ==========
function openProfileModal() {
    if (!currentUser) return;
    document.getElementById('profileName').value = currentUser.name;
    document.getElementById('profileEmail').value = currentUser.email;
    const student = getStudentForParent(currentUser.email);
    if (student) {
        document.getElementById('profileChildField').style.display = 'block';
        document.getElementById('profileGroupField').style.display = 'block';
        document.getElementById('profileChildName').value = student.name;
        document.getElementById('profileGroup').value = student.group || "";
    } else {
        document.getElementById('profileChildField').style.display = 'none';
        document.getElementById('profileGroupField').style.display = 'none';
    }
    const avatars = ["🌸","😊","🌟","⭐","💖","🌺","🍎","📚","🎓","🐱","🐶","🦊","🐼"];
    document.getElementById('avatarOptions').innerHTML = avatars.map(a => `<div class="avatar-emoji ${userAvatars[currentUser.email] === a ? 'selected' : ''}" onclick="selectAvatar('${a}')">${a}</div>`).join('');
    document.getElementById('profileModal').classList.add('active');
}
function closeProfileModal() { document.getElementById('profileModal').classList.remove('active'); }
function selectAvatar(avatar) {
    userAvatars[currentUser.email] = avatar;
    saveAll();
    document.getElementById('userAvatar').innerHTML = avatar;
    closeProfileModal();
    openProfileModal();
}
function saveProfileChanges() {
    const newName = document.getElementById('profileName').value.trim();
    if (newName) {
        const idx = users.findIndex(u => u.email === currentUser.email);
        if (idx !== -1) { users[idx].name = newName; currentUser.name = newName; saveAll(); }
        document.getElementById('userNameSpan').innerText = newName;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
    }
    const student = getStudentForParent(currentUser.email);
    if (student) {
        const newChild = document.getElementById('profileChildName').value.trim();
        const newGroup = document.getElementById('profileGroup').value.trim();
        if (newChild) student.name = newChild;
        if (newGroup) student.group = newGroup;
        saveAll();
    }
    closeProfileModal();
    alert('Профиль обновлён!');
    renderDashboard();
}

// ========== ЧАТ ==========
function sendMessage(text) {
    let studentId = null;
    if (currentUser.role === 'curator') studentId = selectedChatId;
    else if (currentUser.role === 'parent') studentId = getStudentForParent(currentUser.email)?.id;
    if (!studentId || !text.trim()) return;
    chatMessages.push({
        text: text.trim(),
        sender: currentUser.role === 'parent' ? 'parent' : 'curator',
        senderName: currentUser.name,
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
        studentId: studentId
    });
    saveAll();
    renderChat();
}

function renderChat() {
    const container = document.getElementById('chatMessagesModern');
    if (!container) return;
    let studentId = null;
    if (currentUser.role === 'curator') studentId = selectedChatId;
    else if (currentUser.role === 'parent') studentId = getStudentForParent(currentUser.email)?.id;
    const messages = chatMessages.filter(m => m.studentId === studentId);
    container.innerHTML = messages.map(msg => `
        <div class="message-modern ${msg.sender}">
            <div class="message-avatar">${msg.sender === 'parent' ? '👪' : '📚'}</div>
            <div><div class="message-bubble-modern">${msg.text}</div><div class="message-time-modern">${msg.time}</div></div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

// ========== ОСНОВНОЙ РЕНДЕР ==========

                    <select id="subjectGroupSelect"><option value="">Выберите группу</option>${myGroups.map(g => `<option value="${g}">${g}</option>`).join('')}</select>
                    <input type="text" id="newSubjectName" placeholder="Новый предмет">
                    <button id="addSubjectBtn" class="curator-btn">➕ Добавить</button>
                </div>
            </div>

                <div style="font-weight:700;">👨‍🎓 Студенты (${myStudents.length})</div>

                <div style="font-weight:700;">💬 Чаты с родителями</div>
                <div id="chatsGrid" class="chats-grid">${myStudents.map(s => `<div class="chat-item" data-id="${s.id}">💬 ${s.name} (${s.group})</div>`).join('')}</div>

            btn.onclick = () => {
                const group = btn.dataset.group;
                curatorGroups[currentUser.email] = curatorGroups[currentUser.email].filter(g => g !== group);
                saveAll();
                renderDashboard();
            };
        });
        document.getElementById('addGroupBtn')?.addEventListener('click', () => {
            const ng = document.getElementById('newGroupName').value.trim();
            if (ng && !curatorGroups[currentUser.email].includes(ng)) {
                curatorGroups[currentUser.email].push(ng);
                if (!groupSubjects[ng]) groupSubjects[ng] = [...BASE_SUBJECTS];
                saveAll();
                renderDashboard();
            } else alert('Группа уже есть или поле пусто');
        });
        document.querySelectorAll('.remove-subject-btn').forEach(btn => {
            btn.onclick = () => {
                const group = btn.dataset.group;
                const subj = btn.dataset.subject;
                groupSubjects[group] = groupSubjects[group].filter(s => s !== subj);

                renderDashboard();

            const newSubj = document.getElementById('newSubjectName').value.trim();
            if (group && newSubj && !groupSubjects[group].includes(newSubj)) {
                groupSubjects[group].push(newSubj);
                saveAll();
                renderDashboard();
                document.getElementById('newSubjectName').value = '';
            } else alert('Выберите группу и введите новый предмет');

            card.onclick = () => {
                const id = card.dataset.id;
                selectedStudentId = id;
                document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                const student = getStudentById(id);
                if (student) {
                    document.getElementById('curatorPanel').style.display = 'block';
                    const subjects = getSubjectsForGroup(student.group);
                    document.getElementById('subjectSelect').innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
                    document.getElementById('studentForGradeSelect').innerHTML = `<option value="${student.id}">${student.name}</option>`;
                    document.getElementById('gradeDate').value = new Date().toISOString().split('T')[0];
                }
            };
        });
        
        // Чаты
        document.querySelectorAll('.chat-item').forEach(chat => {
            chat.onclick = () => {
                const id = chat.dataset.id;
                selectedChatId = id;
                document.querySelectorAll('.chat-item').forEach(c => c.classList.remove('active'));
                chat.classList.add('active');
                const student = getStudentById(id);
                document.getElementById('chatHeaderName').innerText = `Чат с родителем ${student?.name || 'студента'}`;
                document.getElementById('chatContainer').style.display = 'block';
                renderChat();
                document.getElementById('sendChatBtn').onclick = () => {
                    const inp = document.getElementById('chatInput');
                    sendMessage(inp.value);
                    inp.value = '';
                };
                document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('sendChatBtn').click(); };
            };
        });
        
        // Добавление оценки
        document.getElementById('addGradeBtn')?.addEventListener('click', () => {
            if (!selectedStudentId) { alert('Выберите ученика'); return; }
            const student = getStudentById(selectedStudentId);
            const subj = document.getElementById('subjectSelect').value;
            const val = parseInt(document.getElementById('gradeSelect').value);
            const date = document.getElementById('gradeDate').value || new Date().toISOString().split('T')[0];
            const comment = document.getElementById('gradeComment').value || '';
            const isControl = document.querySelector('input[name="gradeType"]:checked')?.value === 'control';
            const weight = isControl ? 2 : 1;
            if (!student.grades) student.grades = {};
            if (!student.grades[subj]) student.grades[subj] = [];
            student.grades[subj].push({ value: val, date, comment, weight });
            saveAll();
            const msg = document.getElementById('curatorSuccessMsg');
            msg.style.display = 'block';
            msg.innerText = `✅ Оценка ${val} по ${subj} добавлена`;
            setTimeout(() => msg.style.display = 'none', 2000);
            document.getElementById('gradeComment').value = '';
        });
        
        // Добавление пропуска
        document.getElementById('addAbsenceBtn')?.addEventListener('click', () => {
            if (!selectedStudentId) { alert('Выберите ученика'); return; }
            const student = getStudentById(selectedStudentId);
            const date = document.getElementById('absenceDate').value || new Date().toISOString().split('T')[0];
            const type = document.getElementById('absenceType').value;
            if (!student.absences) student.absences = [];
            if (!student.absences.find(a => a.date === date)) {
                student.absences.push({ date, type });
                saveAll();
                const msg = document.getElementById('curatorSuccessMsg');
                msg.style.display = 'block';
                msg.innerText = `📅 Пропуск за ${date} добавлен`;
                setTimeout(() => msg.style.display = 'none', 2000);
            } else alert('Пропуск за эту дату уже есть');
        });
    }
}

// ========== ДЕТАЛЬНЫЕ СТРАНИЦЫ ==========
function showGradesDetail() {
    const student = getStudentById(selectedStudentId);
    if (!student) return;
    const subjects = getSubjectsForGroup(student.group);
    let rows = '';
    for (let s of subjects) {
        const grades = student.grades?.[s] || [];
        let total = 0, weight = 0;
        for (let g of grades) { total += g.value * (g.weight||1); weight += (g.weight||1); }
        const avg = weight ? (total/weight).toFixed(1) : '—';
        const last = grades[grades.length-1];
        rows += `<tr><td>📚 ${s}</td><td>${avg}</td><td>${last ? `<span class="grade-badge">${last.value}</span> ${last.date ? 'от '+last.date : ''}` : '—'}</td></tr>`;
    }
    document.getElementById('dynamicContent').innerHTML = `
        <div class="detail-page">
            <div class="detail-title">📖 Успеваемость: ${student.name}</div>
            <table class="subjects-table"><thead><tr><th>Предмет</th><th>Средний балл</th><th>Последняя оценка</th></tr></thead><tbody>${rows}</tbody></table>
            <button class="back-link" onclick="showMainPage()">← На главную</button>
        </div>
    `;
    document.getElementById('dynamicContent').style.display = 'block';
    document.getElementById('dashboardContainer').style.display = 'none';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector('.nav-btn[data-page="grades"]').classList.add('active');
}

function showAttendanceDetail() {
    const student = getStudentById(selectedStudentId);
    if (!student) return;
    let list = '';
    (student.absences || []).slice().reverse().forEach(a => {
        const icon = a.type === 'болезнь' ? '🤒' : (a.type === 'опоздание' ? '⏰' : '📋');
        list += `<div style="padding:12px; border-bottom:1px solid #ffe0f0;">📅 ${a.date} ${icon} ${a.type}</div>`;
    });
    document.getElementById('dynamicContent').innerHTML = `
        <div class="detail-page">
            <div class="detail-title">📅 Посещаемость: ${student.name}</div>
            ${list || '<div style="padding:20px; text-align:center;">✨ Нет пропусков</div>'}
            <button class="back-link" onclick="showMainPage()">← На главную</button>
        </div>
    `;
    document.getElementById('dynamicContent').style.display = 'block';
    document.getElementById('dashboardContainer').style.display = 'none';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector('.nav-btn[data-page="attendance"]').classList.add('active');
}

function showMainPage() {
    document.getElementById('dynamicContent').style.display = 'none';
    document.getElementById('dashboardContainer').style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector('.nav-btn[data-page="main"]').classList.add('active');
    renderDashboard();
}

// ========== АВТОРИЗАЦИЯ ==========
function showAuth() {
    document.getElementById('authBlock').style.display = 'block';
    document.getElementById('dashboardBlock').classList.remove('active');
    document.getElementById('dashboardBlock').style.display = 'none';
}

function showDashboardApp() {
    document.getElementById('authBlock').style.display = 'none';
    document.getElementById('dashboardBlock').classList.add('active');
    document.getElementById('dashboardBlock').style.display = 'block';
    updateCurrentDate();
    renderDashboard();
    
    // Навигация
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            const page = btn.dataset.page;
            if (page === 'main') showMainPage();
            else if (page === 'grades') showGradesDetail();
            else if (page === 'attendance') showAttendanceDetail();
        };
    });
}

document.getElementById('regRole').onchange = function() {
    const isParent = this.value === 'parent';
    document.getElementById('parentFields').style.display = isParent ? 'block' : 'none';
    document.getElementById('curatorFields').style.display = isParent ? 'none' : 'block';
};
document.getElementById('regRole').dispatchEvent(new Event('change'));

document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.onclick = function() {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('loginForm').classList.toggle('hidden', this.dataset.tab !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', this.dataset.tab !== 'register');
    };
});

document.getElementById('doRegisterBtn').onclick = function() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const role = document.getElementById('regRole').value;
    const pwd = document.getElementById('regPassword').value;
    const err = document.getElementById('regError');
    if (!name || !email || !pwd) { err.innerText = 'Заполните все поля'; return; }
    if (pwd.length < 6) { err.innerText = 'Пароль минимум 6 символов'; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.innerText = 'Неверный email'; return; }
    if (users.find(u => u.email === email)) { err.innerText = 'Email уже существует'; return; }
    
    if (role === 'parent') {
        const child = document.getElementById('regChildName').value.trim();
        const group = document.getElementById('regGroupNumber').value.trim();
        if (!child || !group) { err.innerText = 'Заполните данные студента'; return; }
        const existing = students.find(s => s.name === child);
        if (!existing) students.push({ id: 's'+Date.now(), name: child, group, parentEmail: email, parentName: name, grades: {}, absences: [] });
        else if (existing.parentEmail && existing.parentEmail !== email) { err.innerText = 'Студент уже привязан'; return; }
        else { existing.parentEmail = email; existing.parentName = name; existing.group = group; }
    } else {
        const curatorGroup = document.getElementById('regCuratorGroup').value.trim();
        curatorGroups[email] = curatorGroup ? [curatorGroup] : [];
        if (curatorGroup && !groupSubjects[curatorGroup]) groupSubjects[curatorGroup] = [...BASE_SUBJECTS];
    }
    users.push({ id: 'u'+Date.now(), name, email, password: pwd, role });
    saveAll();
    alert('Регистрация успешна! Войдите.');
    document.querySelector('.auth-tab[data-tab="login"]').click();
    document.getElementById('loginEmail').value = email;
    document.getElementById('loginPassword').value = '';
};

document.getElementById('doLoginBtn').onclick = function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    const user = users.find(u => u.email === email && u.password === pwd);
    if (!user) { document.getElementById('loginError').innerText = 'Неверный email или пароль'; return; }
    currentUser = { id: user.id, name: user.name, email: user.email, role: user.role };
    localStorage.setItem('currentUser', JSON.stringify(currentUser));
    if (user.role === 'parent') {
        const s = getStudentForParent(user.email);
        if (s) selectedStudentId = s.id;
    }
    showDashboardApp();
};

document.getElementById('logoutBtnMain').onclick = function() {
    localStorage.removeItem('currentUser');
    currentUser = null;
    showAuth();
};

// Запуск
updateCurrentDate();
const saved = localStorage.getItem('currentUser');
if (saved) {
    currentUser = JSON.parse(saved);
    showDashboardApp();
} else {
    showAuth();
}
</script>
</body>
